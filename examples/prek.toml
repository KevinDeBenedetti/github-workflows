# prek.toml — drop this file at your project root
# install: brew install j178/tap/prek && prek install
# run:     prek run --all-files | update: prek autoupdate

minimum_prek_version = "0.3.0"
fail_fast = false
default_install_hook_types = ["pre-commit"]

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"] },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-json" },
  { id = "check-merge-conflict" },
  { id = "detect-private-key" },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
]
