name: CI/CD

# ─────────────────────────────────────────────────────────────────────────────
# Standalone — FastAPI à la racine
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: KevinDeBenedetti/.github/.github/workflows/ci-python.yml@main
    with:
      python-version: '3.12'
    secrets: inherit

  deploy-production:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: KevinDeBenedetti/.github/.github/workflows/deploy-docker.yml@main
    with:
      context: .
      platforms: linux/amd64,linux/arm64
    secrets: inherit

  release:
    needs: deploy-production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: KevinDeBenedetti/.github/.github/workflows/release.yml@main
    with:
      release-type: python
    secrets: inherit