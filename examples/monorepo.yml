name: CI/CD

# ─────────────────────────────────────────────────────────────────────────────
# Monorepo — apps/*
#
# Chaque sous-app est détectée automatiquement.
# Le package manager (pnpm ou bun) est auto-détecté par lockfile dans chaque app.
# Ajoute autant de blocs ci-<app> / deploy-<app> que nécessaire.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ── Detect changed apps ───────────────────────────────────────────────────
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      changed-api:    ${{ steps.detect.outputs.changed-api }}
      changed-web:    ${{ steps.detect.outputs.changed-web }}
      changed-client: ${{ steps.detect.outputs.changed-client }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        uses: KevinDeBenedetti/.github/.github/actions/detect-changes@main
        with:
          apps-directory: apps

  # ── CI apps/api — FastAPI ─────────────────────────────────────────────────
  ci-api:
    needs: detect
    if: needs.detect.outputs.changed-api == 'true'
    uses: KevinDeBenedetti/.github/.github/workflows/ci-python.yml@main
    with:
      working-directory: apps/api
    secrets: inherit

  # ── CI apps/web — Next.js ou Nuxt (pnpm ou bun, auto-détecté) ─────────────
  ci-web:
    needs: detect
    if: needs.detect.outputs.changed-web == 'true'
    uses: KevinDeBenedetti/.github/.github/workflows/ci-node.yml@main
    with:
      working-directory: apps/web
      # package-manager: bun  # décommente pour forcer
      # framework: nuxt       # décommente si Nuxt (sinon auto-détecté)
    secrets: inherit

  # ── CI apps/client — React ou Vue (pnpm ou bun, auto-détecté) ─────────────
  ci-client:
    needs: detect
    if: needs.detect.outputs.changed-client == 'true'
    uses: KevinDeBenedetti/.github/.github/workflows/ci-node.yml@main
    with:
      working-directory: apps/client
    secrets: inherit

  # ── Deploy preview — web (PR uniquement) ──────────────────────────────────
  deploy-web-preview:
    needs: [detect, ci-web]
    if: |
      github.event_name == 'pull_request' &&
      needs.detect.outputs.changed-web == 'true'
    uses: KevinDeBenedetti/.github/.github/workflows/deploy-vercel.yml@main
    with:
      environment: preview
      working-directory: apps/web
    secrets: inherit

  # ── Deploy production — web ───────────────────────────────────────────────
  deploy-web-prod:
    needs: [detect, ci-web]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.detect.outputs.changed-web == 'true'
    uses: KevinDeBenedetti/.github/.github/workflows/deploy-vercel.yml@main
    with:
      environment: production
      working-directory: apps/web
    secrets: inherit

  # ── Deploy production — api ───────────────────────────────────────────────
  deploy-api-prod:
    needs: [detect, ci-api]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.detect.outputs.changed-api == 'true'
    uses: KevinDeBenedetti/.github/.github/workflows/deploy-docker.yml@main
    with:
      context: apps/api
      image-name: ${{ github.event.repository.name }}-api
    secrets: inherit

  # ── Security (main seulement) ─────────────────────────────────────────────
  security:
    needs: detect
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: KevinDeBenedetti/.github/.github/workflows/security.yml@main
    with:
      run-node-audit: true
      run-python-audit: true
      node-working-directory: apps/web
      python-working-directory: apps/api
    secrets: inherit