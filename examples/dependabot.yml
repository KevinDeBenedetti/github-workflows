# Bot commit guard for pull requests
#
# Drop this file into .github/workflows/ in any repository.
# Blocks PRs that contain commits authored by unauthorised bots, while
# allowing the bots you explicitly trust (e.g. dependabot).
#
# Recommended repository settings:
#   Settings → Branches → Branch protection with at least one required check

name: Dependabot

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # Block PRs that contain commits from unauthorised bots.
  bot-guard:
    uses: KevinDeBenedetti/github-workflows/.github/workflows/check-bot-commits.yml@main
    with:
      # Bots allowed to author commits in a PR (JSON array of logins).
      allowed-bots: '["dependabot[bot]"]'
