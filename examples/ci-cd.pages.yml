name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: KevinDeBenedetti/.github/.github/workflows/ci-node.yml@main
    with:
      node-version: '20'
    secrets: inherit

  # Storybook published on GitHub Pages
  deploy-storybook:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: KevinDeBenedetti/.github/.github/workflows/deploy-pages.yml@main
    with:
      build-command: pnpm build-storybook
      output-directory: storybook-static
    secrets: inherit

  release:
    needs: deploy-storybook
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: KevinDeBenedetti/.github/.github/workflows/release.yml@main
    secrets: inherit