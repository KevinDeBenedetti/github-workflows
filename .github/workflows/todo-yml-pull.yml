name: Issues → TODO

on:
  workflow_call:
    inputs:
      issue-number:
        description: Number of the issue that triggered the event
        type: number
        required: true
    secrets:
      token:
        description: PAT with contents:write and issues:read access
        required: true

jobs:
  sync:
    name: Sync GitHub Issue → TODO.yml
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.token }}

      - name: Checkout sync script
        uses: actions/checkout@v5
        with:
          repository: KevinDeBenedetti/github-workflows
          path: _sync
          sparse-checkout: scripts

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: _sync/scripts

      - name: Run sync (pull)
        env:
          GITHUB_TOKEN: ${{ secrets.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
        run: bun run _sync/scripts/sync-todo.ts pull
