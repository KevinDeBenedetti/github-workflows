name: Deploy — Docs to Central Repo

on:
  workflow_call:
    inputs:
      docs-directory:
        description: 'Path to the docs folder in the calling repo'
        type: string
        required: false
        default: 'docs'
      target-repo:
        description: 'Centralized docs repository (owner/repo)'
        type: string
        required: false
        default: 'KevinDeBenedetti/kevindebenedetti.github.io'
      target-directory:
        description: >
          Logical name for this repo's docs in the central site
          (used as metadata in the dispatch payload).
          Defaults to the calling repository name (e.g. github-workflows).
        type: string
        required: false
        default: ''
    outputs:
      docs-synced:
        description: '"true" when the docs-updated dispatch was sent successfully.'
        value: ${{ jobs.dispatch.outputs.dispatched }}
    secrets:
      PAT_TOKEN:
        description: >
          Fine-grained PAT with contents:write on the target repository
          (KevinDeBenedetti/kevindebenedetti.github.io or the value of target-repo).
          Required to send the repository_dispatch event.
        required: true

jobs:
  dispatch:
    name: Dispatch docs-updated → ${{ inputs.target-repo }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      dispatched: ${{ steps.dispatch.outputs.dispatched }}

    steps:
      - name: Resolve target directory
        id: dirs
        env:
          INPUT_TARGET: ${{ inputs.target-directory }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          TARGET_DIR="${INPUT_TARGET:-$REPO_NAME}"
          echo "target=${TARGET_DIR}" >> "$GITHUB_OUTPUT"

      - name: Dispatch docs-updated event
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          TARGET_REPO: ${{ inputs.target-repo }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_REF: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
          DOCS_DIR: ${{ inputs.docs-directory }}
          TARGET_DIR: ${{ steps.dirs.outputs.target }}
        run: |
          gh api "repos/${TARGET_REPO}/dispatches" \
            --method POST \
            -f event_type=docs-updated \
            -f "client_payload[repo]=${SOURCE_REPO}" \
            -f "client_payload[ref]=${SOURCE_REF}" \
            -f "client_payload[sha]=${SOURCE_SHA}" \
            -f "client_payload[docs_directory]=${DOCS_DIR}" \
            -f "client_payload[target_directory]=${TARGET_DIR}"
          echo "dispatched=true" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          {
            echo "### 📄 Docs Update Dispatched"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| 📦 **Source repo** | \`${{ github.repository }}\` |"
            echo "| 📂 **Docs folder** | \`${{ inputs.docs-directory }}/\` |"
            echo "| 🔀 **Ref** | \`${{ github.ref_name }}\` \`${{ github.sha }}\` |"
            echo "| 🎯 **Target** | \`${{ inputs.target-repo }}\` |"
            echo "| ✅ **Status** | \`docs-updated\` event dispatched — rebuild triggered |"
          } >> "$GITHUB_STEP_SUMMARY"
