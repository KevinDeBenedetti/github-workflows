name: Deploy — Docs to Central Repo

on:
  workflow_call:
    inputs:
      docs-directory:
        description: 'Path to the docs folder in the calling repo'
        type: string
        required: false
        default: 'docs'
      target-repo:
        description: 'Centralized docs repository (owner/repo)'
        type: string
        required: false
        default: 'KevinDeBenedetti/kevindebenedetti.github.io'
      target-directory:
        description: >
          Subdirectory in the target repo to sync docs into.
          Defaults to the calling repository name (e.g. github-workflows).
        type: string
        required: false
        default: ''
    outputs:
      docs-synced:
        description: '"true" if docs were actually changed and pushed, "false" if nothing changed.'
        value: ${{ jobs.sync.outputs.docs-synced }}
    secrets:
      PAT_TOKEN:
        description: >
          Fine-grained PAT with contents:write on the target repository
          (KevinDeBenedetti/kevindebenedetti.github.io or the value of target-repo).
          Used both to push synced docs and to dispatch the docs-updated event.
        required: true

jobs:
  sync:
    name: Sync docs → ${{ inputs.target-repo }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docs-synced: ${{ steps.commit.outputs.pushed }}

    steps:
      - name: Checkout source (calling repo)
        uses: actions/checkout@v5
        with:
          path: source

      - name: Checkout target (central docs repo)
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.target-repo }}
          token: ${{ secrets.PAT_TOKEN }}
          path: target

      - name: Resolve target directory
        id: dirs
        env:
          INPUT_TARGET: ${{ inputs.target-directory }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          TARGET_DIR="${INPUT_TARGET:-$REPO_NAME}"
          echo "target=${TARGET_DIR}" >> "$GITHUB_OUTPUT"

      - name: Sync docs
        run: |
          mkdir -p "target/${{ steps.dirs.outputs.target }}"
          rsync -av --delete \
            "source/${{ inputs.docs-directory }}/" \
            "target/${{ steps.dirs.outputs.target }}/"

      - name: Commit and push
        id: commit
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "docs: sync ${{ github.repository }}@${{ github.ref_name }}"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Dispatch docs-updated event
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          TARGET_REPO: ${{ inputs.target-repo }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_REF: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
          DOCS_DIR: ${{ inputs.docs-directory }}
        run: |
          gh api "repos/${TARGET_REPO}/dispatches" \
            --method POST \
            -f event_type=docs-updated \
            -f "client_payload[repo]=${SOURCE_REPO}" \
            -f "client_payload[ref]=${SOURCE_REF}" \
            -f "client_payload[sha]=${SOURCE_SHA}" \
            -f "client_payload[docs_directory]=${DOCS_DIR}"

      - name: Summary
        run: |
          PUSHED="${{ steps.commit.outputs.pushed }}"
          {
            echo "### 📄 Docs Synced to Central Repo"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| 📦 **Source repo** | \`${{ github.repository }}\` |"
            echo "| 📂 **Docs folder** | \`${{ inputs.docs-directory }}/\` |"
            echo "| 🔀 **Ref** | \`${{ github.ref_name }}\` \`${{ github.sha }}\` |"
            echo "| 📁 **Target** | \`${{ inputs.target-repo }}/${{ steps.dirs.outputs.target }}/\` |"
            if [ "$PUSHED" = "true" ]; then
              echo "| ✅ **Status** | Docs pushed — rebuild dispatched |"
            else
              echo "| ⏭️ **Status** | No changes — skipped |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
