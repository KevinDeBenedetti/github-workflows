name: Deploy — Docs to GitHub Pages

on:
  workflow_call:
    inputs:
      docs-directory:
        description: 'Path to the docs folder to deploy'
        type: string
        required: false
        default: 'docs'
    outputs:
      page-url:
        description: URL of the deployed GitHub Pages site
        value: ${{ jobs.deploy.outputs.page-url }}

jobs:
  build:
    name: Upload docs artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ inputs.docs-directory }}

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    outputs:
      page-url: ${{ steps.pages.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: pages
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          {
            echo "### 📄 Docs Deployed to GitHub Pages"
            echo ""
            echo "🌍 **URL:** ${{ steps.pages.outputs.page_url }}"
            echo "📁 **Source:** \`${{ inputs.docs-directory }}/\`"
            echo "📦 **Repository:** \`${{ github.repository }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
