name: Test — Security

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/security.yml
      - .github/workflows/test-security.yml
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/security.yml
      - .github/workflows/test-security.yml
  workflow_dispatch:

concurrency:
  group: test-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/security.yml
    with:
      run-node-audit: false
      run-python-audit: false
      run-secret-scan: true
      run-codeql: false
