name: Test — CI Shell

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/ci/shell.yml
      - .github/actions/actionlint/**
      - .github/actions/shellcheck/**
      - .github/actions/bats/**
      - .github/workflows/test/ci-shell.yml
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ci/shell.yml
      - .github/actions/actionlint/**
      - .github/actions/shellcheck/**
      - .github/actions/bats/**
      - .github/workflows/test/ci-shell.yml
  workflow_dispatch:

concurrency:
  group: test-ci-shell-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/ci/shell.yml
    with:
      run-shellcheck: false
      run-actionlint: true
      actionlint-paths: .github/workflows/
      run-bats: false
      run-docker: false
      run-link-check: true
      link-check-paths: 'docs/**/*.md'
