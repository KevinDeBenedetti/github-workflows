name: Purge — Workflow Runs

on:
  workflow_call:
    inputs:
      keep:
        description: Number of most-recent runs to keep per workflow
        type: number
        required: false
        default: 10
      workflow:
        description: Workflow filename to purge (e.g. ci-node.yml). Leave empty to purge all workflows.
        type: string
        required: false
        default: ''
      status:
        description: Only delete runs with this status (completed|failure|cancelled|skipped). Leave empty for all statuses.
        type: string
        required: false
        default: ''
      dry-run:
        description: List what would be deleted without actually deleting anything
        type: boolean
        required: false
        default: false
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 03:00 UTC
  # NOTE: inputs are duplicated between workflow_call and workflow_dispatch.
  # Keep them in sync manually — GitHub does not support shared input definitions.
  workflow_dispatch:
    inputs:
      keep:
        description: Number of most-recent runs to keep per workflow
        type: number
        required: false
        default: 10
      workflow:
        description: Workflow filename to purge (e.g. ci-node.yml). Leave empty to purge all workflows.
        type: string
        required: false
        default: ''
      status:
        description: Only delete runs with this status (completed|failure|cancelled|skipped). Leave empty for all statuses.
        type: string
        required: false
        default: ''
      dry-run:
        description: List what would be deleted without actually deleting anything
        type: boolean
        required: false
        default: false

concurrency:
  group: purge-workflow-runs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  purge:
    name: Purge old workflow runs
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Purge old workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP: ${{ inputs.keep || 10 }}
          FILTER_WORKFLOW: ${{ inputs.workflow || '' }}
          FILTER_STATUS: ${{ inputs.status || '' }}
          DRY_RUN: ${{ inputs.dry-run || false }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          DELETED=0
          SKIPPED=0
          SUMMARY=""

          # Build status filter query param
          STATUS_PARAM=""
          if [[ -n "$FILTER_STATUS" ]]; then
            STATUS_PARAM="&status=${FILTER_STATUS}"
            echo "🔍 Filtering by status: ${FILTER_STATUS}"
          fi

          # Collect workflow IDs to process
          if [[ -n "$FILTER_WORKFLOW" ]]; then
            echo "🔍 Filtering by workflow: ${FILTER_WORKFLOW}"
            mapfile -t WORKFLOW_IDS < <(
              gh api "repos/${REPO}/actions/workflows" --paginate \
                --jq ".workflows[] | select(.path | endswith(\"/${FILTER_WORKFLOW}\")) | .id"
            )
            if [[ ${#WORKFLOW_IDS[@]} -eq 0 ]]; then
              echo "❌ No workflow found matching: ${FILTER_WORKFLOW}"
              exit 1
            fi
          else
            echo "🔍 Processing all workflows"
            mapfile -t WORKFLOW_IDS < <(
              gh api "repos/${REPO}/actions/workflows" --paginate \
                --jq '.workflows[].id'
            )
          fi

          echo "📋 Workflows to process: ${#WORKFLOW_IDS[@]}"

          for WF_ID in "${WORKFLOW_IDS[@]}"; do
            WF_NAME=$(gh api "repos/${REPO}/actions/workflows/${WF_ID}" --jq '.name')
            WF_FILE=$(gh api "repos/${REPO}/actions/workflows/${WF_ID}" --jq '.path | split("/") | last')
            echo ""
            echo "── ${WF_NAME} (${WF_FILE}) ──"

            # Fetch runs sorted newest-first (API default), with optional status filter
            mapfile -t RUN_IDS < <(
              gh api "repos/${REPO}/actions/workflows/${WF_ID}/runs?per_page=100${STATUS_PARAM}" \
                --paginate --jq '.workflow_runs[].id'
            )

            TOTAL="${#RUN_IDS[@]}"
            echo "   Total runs: ${TOTAL}"

            if (( TOTAL <= KEEP )); then
              echo "   ✅ Within retention limit (keep=${KEEP}) — nothing to delete"
              SUMMARY+="| \`${WF_FILE}\` | ${TOTAL} | 0 |\n"
              continue
            fi

            TO_DELETE=("${RUN_IDS[@]:$KEEP}")
            COUNT="${#TO_DELETE[@]}"
            echo "   🗑️  Will delete ${COUNT} run(s) (keeping newest ${KEEP})"

            for RUN_ID in "${TO_DELETE[@]}"; do
              if [[ "$DRY_RUN" == "true" ]]; then
                echo "   [dry-run] Would delete run ${RUN_ID}"
                (( SKIPPED++ )) || true
              else
                gh api "repos/${REPO}/actions/runs/${RUN_ID}" \
                  --method DELETE \
                  --silent
                echo "   Deleted run ${RUN_ID}"
                (( DELETED++ )) || true
              fi
            done

            SUMMARY+="| \`${WF_FILE}\` | ${TOTAL} | ${COUNT} |\n"
          done

          # Write job summary
          {
            echo "### 🧹 Workflow Runs Purge $([[ "$DRY_RUN" == "true" ]] && echo "(dry run)" || echo "")"
            echo ""
            echo "**Keep:** \`${KEEP}\` most recent per workflow"
            if [[ -n "$FILTER_STATUS" ]]; then
              echo "**Status filter:** \`${FILTER_STATUS}\`"
            fi
            echo ""
            echo "| Workflow | Total | Deleted |"
            echo "|----------|-------|---------|"
            printf "%b" "$SUMMARY"
            echo ""
            if [[ "$DRY_RUN" == "true" ]]; then
              echo "> ℹ️ Dry-run mode — no runs were deleted."
            else
              echo "> Deleted **${DELETED}** run(s) across all workflows."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
