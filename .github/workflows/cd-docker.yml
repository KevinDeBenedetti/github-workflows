name: Deploy — Docker

on:
  workflow_call:
    inputs:
      image-name:
        description: Image name (e.g. my-api). Defaults to repo name.
        type: string
        required: false
        default: ''
      context:
        description: Docker build context (e.g. apps/api)
        type: string
        required: false
        default: '.'
      dockerfile:
        description: Path to Dockerfile
        type: string
        required: false
        default: Dockerfile
      platforms:
        description: Target platforms (comma-separated)
        type: string
        required: false
        default: linux/amd64,linux/arm64
      push:
        description: Push image to registry
        type: boolean
        required: false
        default: true
      target:
        description: Build target stage (e.g. dev, prod)
        type: string
        required: false
        default: ''
      tag-latest:
        description: Also tag as :latest
        type: boolean
        required: false
        default: false
      version:
        description: Explicit version tag to apply (e.g. v1.2.3 from a release job output). When set, adds a type=raw tag with this value.
        type: string
        required: false
        default: ''
      build-args:
        description: List of Docker build-args (one per line, KEY=VALUE). Passed to docker/build-push-action build-args.
        type: string
        required: false
        default: ''
    outputs:
      image:
        description: Full image reference with digest
        value: ${{ jobs.docker.outputs.image }}
      digest:
        description: Image digest
        value: ${{ jobs.docker.outputs.digest }}

env:
  REGISTRY: ghcr.io

concurrency:
  group: deploy-docker-${{ github.ref }}-${{ inputs.context }}-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  docker:
    name: Docker build & push (${{ inputs.context }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.push && (github.ref == 'refs/heads/main' && 'production' || 'preview') || '' }}
    permissions:
      contents: read
      packages: write
      deployments: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image name
        id: image
        run: |
          NAME="${{ inputs.image-name }}"
          if [ -z "$NAME" ]; then
            NAME="${{ github.event.repository.name }}"
          fi
          echo "full=${REGISTRY}/${{ github.repository_owner }}/${NAME}" >> "$GITHUB_OUTPUT"

      - name: Docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.full }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            ${{ inputs.version != '' && format('type=raw,value={0}', inputs.version) || '' }}
            ${{ inputs.tag-latest && 'type=raw,value=latest,enable={{is_default_branch}}' || '' }}

      - name: Set up QEMU (multi-platform)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: ${{ inputs.target }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha,scope=${{ inputs.context }}
          cache-to: type=gha,scope=${{ inputs.context }},mode=max

      - name: Export digest summary
        run: |
          {
            echo "### 🐳 Docker Image"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Image | \`${{ steps.image.outputs.full }}\` |"
            echo "| Digest | \`${{ steps.build.outputs.digest }}\` |"
            echo "| Platform | \`${{ inputs.platforms }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
