name: Actions autoupdate

on:
  workflow_call:
    inputs:
      branch:
        description: Branch name for the autoupdate PR
        type: string
        required: false
        default: chore/actions-autoupdate
      labels:
        description: Comma-separated labels to add to the PR (e.g. 'dependencies,chore')
        type: string
        required: false
        default: ''
    secrets:
      PAT_TOKEN:
        description: >
          Personal Access Token — PRs and commits will be opened as this user.
          Must have contents:write, pull-requests:write, and workflows scope
          (required to push changes to .github/workflows/ files).
        required: true
  workflow_dispatch:
    inputs:
      branch:
        description: Branch name for the autoupdate PR
        type: string
        required: false
        default: chore/actions-autoupdate
      labels:
        description: Comma-separated labels to add to the PR
        type: string
        required: false
        default: ''

jobs:
  # ── Bump all action versions and open a PR ──────────────────────────────────
  autoupdate:
    name: Actions autoupdate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Update action versions
        id: update
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          updates=""
          mapfile -t files < <(find .github -name "*.yml" -type f | sort)

          declare -A seen
          while IFS= read -r match; do
            action="${match%@*}"
            version="${match##*@}"
            repo=$(echo "$action" | cut -d'/' -f1-2)

            key="${action}@${version}"
            [[ "${seen[$key]+_}" ]] && continue
            seen[$key]=1

            latest=$(gh api "repos/${repo}/releases/latest" --jq '.tag_name' 2>/dev/null || true)
            if [[ -z "$latest" ]]; then
              latest=$(gh api "repos/${repo}/tags" \
                --jq 'first(.[] | select(.name | test("^v[0-9]"))) | .name' 2>/dev/null || true)
            fi
            [[ -z "$latest" ]] && continue

            # Major-only pin (e.g. @v5): bump only when the major version changes.
            # Full semver pin (e.g. @v1.2.3): update to the exact latest tag.
            if [[ "$version" =~ ^v[0-9]+$ ]]; then
              latest_major=$(echo "$latest" | grep -oE '[0-9]+' | head -1)
              new_version="v${latest_major}"
            else
              new_version="$latest"
            fi

            [[ "$version" == "$new_version" ]] && continue

            echo "Updating ${action}: ${version} → ${new_version}"
            for f in "${files[@]}"; do
              sed -i "s|uses: ${action}@${version}|uses: ${action}@${new_version}|g" "$f"
            done
            updates="${updates}\n- \`${action}\`: \`${version}\` → \`${new_version}\`"
          done < <(grep -rohE \
            'uses: [a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+(/[a-zA-Z0-9_.-]+)?@v[0-9][^ ]*' \
            .github/ --include="*.yml" | sed 's/uses: //' | sort -u)

          {
            echo "updates<<EOF"
            if [[ -n "$updates" ]]; then
              printf "%b\n" "$updates"
            else
              echo "_All actions are already up to date._"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Push branch and open pull request
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          UPDATES: ${{ steps.update.outputs.updates }}
          BRANCH: ${{ inputs.branch || 'chore/actions-autoupdate' }}
          LABELS: ${{ inputs.labels }}
        run: |
          set -euo pipefail

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes – all actions are already up to date."
            exit 0
          fi

          BASE=$(git rev-parse --abbrev-ref HEAD)

          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add -A
          git commit -m "chore: actions autoupdate"
          git push origin "$BRANCH" --force-with-lease

          BODY="$(printf "Automated GitHub Actions version update via \`gh api\`.\n\n**Changes:**\n%s\n\nTriggered by: \`%s\`" \
            "$UPDATES" "${{ github.event_name }}")"

          if gh pr view "$BRANCH" --json number -q .number 2>/dev/null; then
            echo "Pull request already exists for branch $BRANCH"
          else
            LABEL_ARGS=()
            if [[ -n "$LABELS" ]]; then
              IFS=',' read -ra label_list <<< "$LABELS"
              for label in "${label_list[@]}"; do
                LABEL_ARGS+=(--label "$(echo "$label" | xargs)")
              done
            fi
            gh pr create \
              --title "chore: actions autoupdate" \
              --body "$BODY" \
              --base "$BASE" \
              --head "$BRANCH" \
              "${LABEL_ARGS[@]+"${LABEL_ARGS[@]}"}"
          fi
