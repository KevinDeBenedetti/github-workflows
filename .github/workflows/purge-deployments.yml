name: Purge — Deployments

on:
  workflow_call:
    inputs:
      keep:
        description: Number of most-recent deployments to keep per environment
        type: number
        required: false
        default: 10
      max-age-days:
        description: Delete deployments older than N days (0 = no age limit)
        type: number
        required: false
        default: 30
      environment:
        description: Environment name to purge (e.g. production). Leave empty to purge all environments.
        type: string
        required: false
        default: ''
      dry-run:
        description: List what would be deleted without actually deleting anything
        type: boolean
        required: false
        default: false
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 03:00 UTC
  # NOTE: inputs are duplicated between workflow_call and workflow_dispatch.
  # Keep them in sync manually — GitHub does not support shared input definitions.
  workflow_dispatch:
    inputs:
      keep:
        description: Number of most-recent deployments to keep per environment
        type: number
        required: false
        default: 10
      max-age-days:
        description: Delete deployments older than N days (0 = no age limit)
        type: number
        required: false
        default: 30
      environment:
        description: Environment name to purge. Leave empty to purge all environments.
        type: string
        required: false
        default: ''
      dry-run:
        description: List what would be deleted without actually deleting anything
        type: boolean
        required: false
        default: false

concurrency:
  group: purge-deployments-${{ github.ref }}
  cancel-in-progress: false

jobs:
  purge:
    name: Purge old deployments
    runs-on: ubuntu-latest
    permissions:
      deployments: write
      contents: read

    steps:
      - name: Purge old deployments
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP: ${{ inputs.keep || 10 }}
          MAX_AGE_DAYS: ${{ inputs.max-age-days || 30 }}
          FILTER_ENV: ${{ inputs.environment || '' }}
          DRY_RUN: ${{ inputs.dry-run || false }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          DELETED=0
          SKIPPED=0
          SUMMARY=""
          NOW=$(date -u +%s)
          MAX_AGE_SECS=$((MAX_AGE_DAYS * 86400))

          # Build environment filter query param
          if [[ -n "$FILTER_ENV" ]]; then
            echo "🔍 Filtering by environment: ${FILTER_ENV}"
          else
            echo "🔍 Processing all environments"
          fi

          # Collect all unique environments to process
          if [[ -n "$FILTER_ENV" ]]; then
            ENVIRONMENTS=("$FILTER_ENV")
          else
            mapfile -t ENVIRONMENTS < <(
              gh api "repos/${REPO}/deployments?per_page=100" --paginate \
                --jq '.[].environment' | sort -u
            )
          fi

          echo "📋 Environments found: ${ENVIRONMENTS[*]:-none}"
          echo "📅 Retention: Keep last ${KEEP} + anything newer than ${MAX_AGE_DAYS} days"

          for ENV in "${ENVIRONMENTS[@]}"; do
            echo ""
            echo "── Environment: ${ENV} ──"

            # Fetch all deployments for this environment, sorted newest-first (API default)
            mapfile -t DEPLOYS < <(
              gh api "repos/${REPO}/deployments?environment=${ENV}&per_page=100" --paginate \
                --jq -r '.[] | "\(.id)|\(.created_at)"'
            )

            TOTAL="${#DEPLOYS[@]}"
            echo "   Total deployments: ${TOTAL}"

            if (( TOTAL == 0 )); then
              continue
            fi

            # Separate into keep-by-count and check-by-age
            CHECK_BY_AGE=("${DEPLOYS[@]:$KEEP}")

            # Filter by age: delete only if older than MAX_AGE_DAYS
            TO_DELETE=()
            for ENTRY in "${CHECK_BY_AGE[@]}"; do
              ID=$(echo "$ENTRY" | cut -d'|' -f1)
              CREATED=$(echo "$ENTRY" | cut -d'|' -f2)
              CREATED_SECS=$(date -d "$CREATED" +%s 2>/dev/null || echo "$NOW")
              AGE_SECS=$(( NOW - CREATED_SECS ))
              AGE_DAYS=$(( AGE_SECS / 86400 ))

              if (( MAX_AGE_SECS > 0 && AGE_SECS > MAX_AGE_SECS )); then
                TO_DELETE+=("$ID")
                echo "   [age filter] ID $ID is ${AGE_DAYS}d old (limit: ${MAX_AGE_DAYS}d)"
              else
                echo "   [kept by age] ID $ID is ${AGE_DAYS}d old (< ${MAX_AGE_DAYS}d)"
              fi
            done

            COUNT="${#TO_DELETE[@]}"
            if (( COUNT == 0 )); then
              echo "   ✅ No deployments to delete (within limit or recent)"
              SUMMARY+="| \`${ENV}\` | ${TOTAL} | 0 |\n"
              continue
            fi

            echo "   🗑️  Will delete ${COUNT} deployment(s)"

            for ID in "${TO_DELETE[@]}"; do
              if [[ "$DRY_RUN" == "true" ]]; then
                echo "   [dry-run] Would deactivate + delete deployment ${ID}"
                (( SKIPPED++ )) || true
              else
                # Deployments must be set to 'inactive' before deletion
                gh api "repos/${REPO}/deployments/${ID}/statuses" \
                  --method POST \
                  --field state=inactive \
                  --silent || true

                gh api "repos/${REPO}/deployments/${ID}" \
                  --method DELETE \
                  --silent
                echo "   Deleted deployment ${ID}"
                (( DELETED++ )) || true
              fi
            done

            SUMMARY+="| \`${ENV}\` | ${TOTAL} | ${COUNT} |\n"
          done

          # Write job summary
          {
            echo "### 🧹 Deployment Purge $([[ "$DRY_RUN" == "true" ]] && echo "(dry run)" || echo "")"
            echo ""
            echo "**Keep:** \`${KEEP}\` most recent per environment  |  **Max age:** ${MAX_AGE_DAYS} days"
            echo ""
            echo "| Environment | Total | Deleted |"
            echo "|-------------|-------|---------|"
            printf "%b" "$SUMMARY"
            echo ""
            if [[ "$DRY_RUN" == "true" ]]; then
              echo "> ℹ️ Dry-run mode — no deployments were deleted."
            else
              echo "> Deleted **${DELETED}** deployment(s) across all environments."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
