name: Deploy — Kaniko (self-hosted)

# Drop-in replacement for cd-docker.yml for builds running on the k3s cluster.
#
# The job runs INSIDE the official Kaniko executor image (job container), so the
# ARC runner scale set MUST be deployed with `containerMode: kubernetes` — Kaniko
# needs root in a disposable container because it unpacks base-image layers onto
# the container's own root filesystem. Running the executor binary inside the
# runner container (non-root) fails with "permission denied".
#
# The Kaniko debug image is busybox-only (no glibc), so it CANNOT run the
# runner's bundled Node.js — JavaScript actions like actions/checkout and
# docker/metadata-action fail inside it with "env: can't execute .../node:
# No such file or directory" (exit 127). This workflow is therefore fully
# busybox-native: NO JS actions. Kaniko fetches the source itself via its git
# build context, and image tags are computed in POSIX sh.
#
# GHCR auth uses the job's GITHUB_TOKEN (permissions: packages: write) — no
# registry secret needs to be mounted in the runner pod. The same token clones
# the source (GIT_USERNAME/GIT_PASSWORD).
#
# Differences vs. cd-docker.yml:
#   - runs-on: cluster runner — legacy labels ["self-hosted","linux","k3s","kaniko"]
#     by default, or an ARC scale set name via the `runner` input (e.g. '"k3s-portfolio"')
#   - Single architecture only (native cluster arch — linux/amd64)
#   - No QEMU / no multi-platform builds
#   - No GHA layer cache (Kaniko uses --cache-repo on GHCR instead)
#   - digest output not available (Kaniko does not expose it the same way)
#   - Source is cloned by Kaniko (git context), not checked out — the job runs
#     on push events; PR refs (refs/pull/N/merge) are not fetchable this way.
#   - Tags are computed in sh (subset of docker/metadata-action): branch, sha-,
#     the explicit `version` input (+ major.minor if semver), and latest.
#
# Migration: change `uses: .../cd-docker.yml` → `uses: .../cd-kaniko.yml`
# and remove the `platforms` input if present.

on:
  workflow_call:
    inputs:
      image-name:
        description: Image name (e.g. my-api). Defaults to repo name.
        type: string
        required: false
        default: ''
      context:
        description: Docker build context path (relative to repo root)
        type: string
        required: false
        default: '.'
      dockerfile:
        description: Dockerfile path relative to context
        type: string
        required: false
        default: Dockerfile
      push:
        description: Push image to registry
        type: boolean
        required: false
        default: true
      target:
        description: Build target stage (e.g. dev, prod)
        type: string
        required: false
        default: ''
      tag-latest:
        description: Also tag as :latest on default branch
        type: boolean
        required: false
        default: false
      version:
        description: Explicit version tag (e.g. v1.2.3 from release job output)
        type: string
        required: false
        default: ''
      build-args:
        description: Build args (one per line, KEY=VALUE)
        type: string
        required: false
        default: ''
      runner:
        description: Runner labels as JSON — use '"k3s-portfolio"' (ARC scale set) or '["self-hosted","linux","k3s","kaniko"]'
        type: string
        required: false
        default: '["self-hosted","linux","k3s","kaniko"]'
    outputs:
      image:
        description: Primary image tag
        value: ${{ jobs.kaniko.outputs.image }}

  workflow_dispatch:
    inputs:
      image-name:
        description: Image name
        type: string
        default: ''
      context:
        description: Docker build context path
        type: string
        default: '.'
      dockerfile:
        description: Dockerfile path relative to context
        type: string
        default: Dockerfile
      push:
        description: Push image to registry
        type: boolean
        default: true
      target:
        description: Build target stage
        type: string
        default: ''
      tag-latest:
        description: Also tag as :latest
        type: boolean
        default: false
      version:
        description: Explicit version tag
        type: string
        default: ''
      build-args:
        description: Build args (one per line, KEY=VALUE)
        type: string
        default: ''
      runner:
        description: Runner labels as JSON — use '"k3s-portfolio"' (ARC scale set) or '["self-hosted","linux","k3s","kaniko"]'
        type: string
        default: '["self-hosted","linux","k3s","kaniko"]'

env:
  REGISTRY: ghcr.io

concurrency:
  group: deploy-kaniko-${{ github.ref }}-${{ inputs.context }}-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  kaniko:
    name: Kaniko build & push (${{ inputs.context }})
    runs-on: ${{ fromJson(inputs.runner) }}
    # Kaniko must run as root in its own disposable container (it extracts
    # image layers onto /). Requires ARC containerMode: kubernetes.
    container:
      image: gcr.io/kaniko-project/executor:v1.23.2-debug
    defaults:
      run:
        # The debug image only ships busybox sh — no bash.
        shell: sh
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image.outputs.full }}

    steps:
      # No actions/checkout — it is a JS action and the busybox Kaniko image
      # cannot run the runner's glibc Node.js. Kaniko clones the source itself
      # (git context) in the build step below.

      - name: Set image name
        id: image
        run: |
          NAME="${{ inputs.image-name }}"
          [ -z "$NAME" ] && NAME="${{ github.event.repository.name }}"
          # OCI registry repositories must be lowercase. github.repository_owner
          # (and possibly the repo name) can contain uppercase, so normalise here
          # — docker/metadata-action used to do this for us before this workflow
          # was rewritten to drive Kaniko directly.
          FULL=$(printf '%s/%s/%s' "$REGISTRY" "${{ github.repository_owner }}" "$NAME" | tr '[:upper:]' '[:lower:]')
          echo "full=${FULL}" >> "$GITHUB_OUTPUT"

      - name: GHCR auth for Kaniko
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /kaniko/.docker
          AUTH=$(printf '%s' "${GH_ACTOR}:${GH_TOKEN}" | base64 | tr -d '\n')
          printf '{"auths":{"%s":{"auth":"%s"}}}' "$REGISTRY" "$AUTH" > /kaniko/.docker/config.json

      - name: Compute tags
        id: tags
        env:
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          EVENT: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          VERSION: ${{ inputs.version }}
          TAG_LATEST: ${{ inputs.tag-latest }}
        run: |
          # Space-separated bare image tags (no registry prefix). POSIX sh
          # reimplementation of the docker/metadata-action subset we use, since
          # that action needs Node.js (unavailable in the busybox Kaniko image).
          # Tags never contain spaces, so a space-separated list is safe for the
          # `for tag in $TAGS` loop in the build step.
          TAGS=""
          add_tag() { TAGS="${TAGS:+$TAGS }$1"; }

          SHORT_SHA=$(printf '%s' "$SHA" | cut -c1-7)
          add_tag "sha-${SHORT_SHA}"

          # Branch name on push (slashes are illegal in tags → '-').
          if [ "$EVENT" = "push" ] && [ "$REF_TYPE" = "branch" ]; then
            add_tag "$(printf '%s' "$REF_NAME" | tr '/' '-')"
          fi

          # Pull-request builds.
          if [ "$EVENT" = "pull_request" ] && [ -n "$PR_NUMBER" ]; then
            add_tag "pr-${PR_NUMBER}"
          fi

          # Explicit version input, plus major.minor when it is semver.
          if [ -n "$VERSION" ]; then
            add_tag "$VERSION"
            SEMVER="${VERSION#v}"
            case "$SEMVER" in
              [0-9]*.[0-9]*.[0-9]*) add_tag "$(printf '%s' "$SEMVER" | cut -d. -f1-2)" ;;
            esac
          fi

          # latest on the default branch.
          if [ "$TAG_LATEST" = "true" ] && [ "$REF_NAME" = "$DEFAULT_BRANCH" ]; then
            add_tag "latest"
          fi

          echo "Computed tags: $TAGS"
          echo "list=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push with Kaniko
        env:
          TAGS: ${{ steps.tags.outputs.list }}
          BUILD_ARGS: ${{ inputs.build-args }}
          TARGET: ${{ inputs.target }}
          PUSH: ${{ inputs.push }}
          IMAGE_BASE: ${{ steps.image.outputs.full }}
          CONTEXT: ${{ inputs.context }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
          # Kaniko clones the build context over HTTPS with these creds — the
          # job token's `contents: read` is enough.
          GIT_USERNAME: x-access-token
          GIT_PASSWORD: ${{ github.token }}
        run: |
          # POSIX sh (busybox) — tags and build-args are newline-separated,
          # neither may contain spaces.
          DEST=""
          for tag in $TAGS; do
            DEST="$DEST --destination ${IMAGE_BASE}:${tag}"
          done

          ARGS=""
          for arg in $BUILD_ARGS; do
            ARGS="$ARGS --build-arg $arg"
          done

          TARGET_FLAG=""
          [ -n "$TARGET" ] && TARGET_FLAG="--target $TARGET"

          NO_PUSH_FLAG=""
          [ "$PUSH" = "false" ] && NO_PUSH_FLAG="--no-push"

          # Context = this repo at this commit (cloned by Kaniko). --context-sub-path
          # narrows it to the app dir, and --dockerfile resolves relative to that
          # sub-path (Kaniko joins SrcContext + sub-path before the dockerfile lookup).
          GIT_HOST="${SERVER_URL#https://}"

          # shellcheck disable=SC2086
          /kaniko/executor \
            --context="git://${GIT_HOST}/${REPO}.git#${REF}#${SHA}" \
            --context-sub-path="${CONTEXT}" \
            --dockerfile="${DOCKERFILE}" \
            --cache=true \
            --cache-repo="${IMAGE_BASE}-cache" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --label "org.opencontainers.image.revision=${SHA}" \
            --label "org.opencontainers.image.source=${SERVER_URL}/${REPO}" \
            $DEST \
            $TARGET_FLAG \
            $ARGS \
            $NO_PUSH_FLAG

      - name: Job summary
        if: always()
        env:
          IMAGE: ${{ steps.image.outputs.full }}
          TAGS: ${{ steps.tags.outputs.list }}
          CONTEXT: ${{ inputs.context }}
        run: |
          {
            echo "### Kaniko Build"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Image | \`${IMAGE}\` |"
            echo "| Context | \`${CONTEXT}\` |"
            echo "| SHA | \`${{ github.sha }}\` |"
            echo ""
            echo "**Tags:**"
            for tag in $TAGS; do
              echo "- \`${IMAGE}:${tag}\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"
