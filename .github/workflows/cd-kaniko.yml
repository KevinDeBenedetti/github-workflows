name: Deploy — Kaniko (self-hosted)

# Drop-in replacement for cd-docker.yml for builds running on the k3s cluster.
#
# The job runs INSIDE the official Kaniko executor image (job container), so the
# ARC runner scale set MUST be deployed with `containerMode: kubernetes` — Kaniko
# needs root in a disposable container because it unpacks base-image layers onto
# the container's own root filesystem. Running the executor binary inside the
# runner container (non-root) fails with "permission denied".
#
# GHCR auth uses the job's GITHUB_TOKEN (permissions: packages: write) — no
# registry secret needs to be mounted in the runner pod.
#
# Differences vs. cd-docker.yml:
#   - runs-on: cluster runner — legacy labels ["self-hosted","linux","k3s","kaniko"]
#     by default, or an ARC scale set name via the `runner` input (e.g. '"k3s-portfolio"')
#   - Single architecture only (native cluster arch — linux/amd64)
#   - No QEMU / no multi-platform builds
#   - No GHA layer cache (Kaniko uses --cache-repo on GHCR instead)
#   - digest output not available (Kaniko does not expose it the same way)
#
# Migration: change `uses: .../cd-docker.yml` → `uses: .../cd-kaniko.yml`
# and remove the `platforms` input if present.

on:
  workflow_call:
    inputs:
      image-name:
        description: Image name (e.g. my-api). Defaults to repo name.
        type: string
        required: false
        default: ''
      context:
        description: Docker build context path (relative to repo root)
        type: string
        required: false
        default: '.'
      dockerfile:
        description: Dockerfile path relative to context
        type: string
        required: false
        default: Dockerfile
      push:
        description: Push image to registry
        type: boolean
        required: false
        default: true
      target:
        description: Build target stage (e.g. dev, prod)
        type: string
        required: false
        default: ''
      tag-latest:
        description: Also tag as :latest on default branch
        type: boolean
        required: false
        default: false
      version:
        description: Explicit version tag (e.g. v1.2.3 from release job output)
        type: string
        required: false
        default: ''
      build-args:
        description: Build args (one per line, KEY=VALUE)
        type: string
        required: false
        default: ''
      runner:
        description: Runner labels as JSON — use '"k3s-portfolio"' (ARC scale set) or '["self-hosted","linux","k3s","kaniko"]'
        type: string
        required: false
        default: '["self-hosted","linux","k3s","kaniko"]'
    outputs:
      image:
        description: Primary image tag
        value: ${{ jobs.kaniko.outputs.image }}

  workflow_dispatch:
    inputs:
      image-name:
        description: Image name
        type: string
        default: ''
      context:
        description: Docker build context path
        type: string
        default: '.'
      dockerfile:
        description: Dockerfile path relative to context
        type: string
        default: Dockerfile
      push:
        description: Push image to registry
        type: boolean
        default: true
      target:
        description: Build target stage
        type: string
        default: ''
      tag-latest:
        description: Also tag as :latest
        type: boolean
        default: false
      version:
        description: Explicit version tag
        type: string
        default: ''
      build-args:
        description: Build args (one per line, KEY=VALUE)
        type: string
        default: ''
      runner:
        description: Runner labels as JSON — use '"k3s-portfolio"' (ARC scale set) or '["self-hosted","linux","k3s","kaniko"]'
        type: string
        default: '["self-hosted","linux","k3s","kaniko"]'

env:
  REGISTRY: ghcr.io

concurrency:
  group: deploy-kaniko-${{ github.ref }}-${{ inputs.context }}-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  kaniko:
    name: Kaniko build & push (${{ inputs.context }})
    runs-on: ${{ fromJson(inputs.runner) }}
    # Kaniko must run as root in its own disposable container (it extracts
    # image layers onto /). Requires ARC containerMode: kubernetes.
    container:
      image: gcr.io/kaniko-project/executor:v1.23.2-debug
    defaults:
      run:
        # The debug image only ships busybox sh — no bash.
        shell: sh
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image.outputs.full }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image name
        id: image
        run: |
          NAME="${{ inputs.image-name }}"
          [ -z "$NAME" ] && NAME="${{ github.event.repository.name }}"
          echo "full=${REGISTRY}/${{ github.repository_owner }}/${NAME}" >> "$GITHUB_OUTPUT"

      - name: GHCR auth for Kaniko
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /kaniko/.docker
          AUTH=$(printf '%s' "${GH_ACTOR}:${GH_TOKEN}" | base64 | tr -d '\n')
          printf '{"auths":{"%s":{"auth":"%s"}}}' "$REGISTRY" "$AUTH" > /kaniko/.docker/config.json

      - name: Docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.full }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            ${{ inputs.version != '' && format('type=raw,value={0}', inputs.version) || '' }}
            ${{ inputs.tag-latest && 'type=raw,value=latest,enable={{is_default_branch}}' || '' }}

      - name: Build and push with Kaniko
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          BUILD_ARGS: ${{ inputs.build-args }}
          TARGET: ${{ inputs.target }}
          PUSH: ${{ inputs.push }}
          IMAGE_BASE: ${{ steps.image.outputs.full }}
          CONTEXT: ${{ inputs.context }}
          DOCKERFILE: ${{ inputs.dockerfile }}
        run: |
          # POSIX sh (busybox) — tags and build-args are newline-separated,
          # neither may contain spaces.
          DEST=""
          for tag in $TAGS; do
            DEST="$DEST --destination $tag"
          done

          ARGS=""
          for arg in $BUILD_ARGS; do
            ARGS="$ARGS --build-arg $arg"
          done

          TARGET_FLAG=""
          [ -n "$TARGET" ] && TARGET_FLAG="--target $TARGET"

          NO_PUSH_FLAG=""
          [ "$PUSH" = "false" ] && NO_PUSH_FLAG="--no-push"

          # shellcheck disable=SC2086
          /kaniko/executor \
            --context="dir://${GITHUB_WORKSPACE}/${CONTEXT}" \
            --dockerfile="${GITHUB_WORKSPACE}/${CONTEXT}/${DOCKERFILE}" \
            --cache=true \
            --cache-repo="${IMAGE_BASE}-cache" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            $DEST \
            $TARGET_FLAG \
            $ARGS \
            $NO_PUSH_FLAG

      - name: Job summary
        if: always()
        env:
          IMAGE: ${{ steps.image.outputs.full }}
          TAGS: ${{ steps.meta.outputs.tags }}
          CONTEXT: ${{ inputs.context }}
        run: |
          {
            echo "### Kaniko Build"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Image | \`${IMAGE}\` |"
            echo "| Context | \`${CONTEXT}\` |"
            echo "| SHA | \`${{ github.sha }}\` |"
            echo ""
            echo "**Tags:**"
            for tag in $TAGS; do
              echo "- \`$tag\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"
