name: Check Bot Commits

on:
  workflow_call:
    inputs:
      allowed-bots:
        description: >
          JSON array of bot logins whose commits are permitted
          (e.g. '["dependabot[bot]","renovate[bot]"]'). Empty by default — all bot commits fail.
        type: string
        required: false
        default: '[]'
      fail-on-bot-commits:
        description: Fail the workflow when bot commits are found (set false to warn only)
        type: boolean
        required: false
        default: true

jobs:
  # ── Guard: no bot-authored commits in PRs ──────────────────────────────────
  check-authors:
    name: Check for bot-authored commits
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check commit authors
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ALLOWED_BOTS: ${{ inputs.allowed-bots }}
          FAIL_ON_BOT: ${{ inputs.fail-on-bot-commits }}
        run: |
          set -euo pipefail

          # Fetch full commit metadata: login, GitHub account type, and git author name/email
          COMMITS=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/commits" \
            --jq '.[] | {
              login:  (.author.login  // .commit.author.name),
              type:   (.author.type   // "Unknown"),
              name:   .commit.author.name,
              email:  .commit.author.email
            }' 2>/dev/null || true)

          if [ -z "$COMMITS" ]; then
            echo "No commits found (or PR has no commits yet). Skipping."
            exit 0
          fi

          BOT_FOUND=false
          BOT_LIST=""
          SUMMARY="## 🤖 Bot Commit Check\n\n| Author | Type | Verdict |\n|--------|------|---------|"

          while IFS= read -r line; do
            login=$(echo "$line" | jq -r '.login')
            type=$(echo "$line"  | jq -r '.type')
            name=$(echo "$line"  | jq -r '.name')
            email=$(echo "$line" | jq -r '.email')

            # Primary: GitHub API type field ("Bot" is set by GitHub for bot accounts)
            # Fallback: [bot] suffix in login, or bot noreply email pattern
            is_bot=false
            if [[ "$type" == "Bot" ]]; then
              is_bot=true
            elif [[ "$login" == *"[bot]" ]]; then
              is_bot=true
            elif [[ "$email" =~ \+.*\[bot\]@users\.noreply\.github\.com$ ]]; then
              is_bot=true
            fi

            if [ "$is_bot" = "true" ]; then
              if echo "$ALLOWED_BOTS" | jq -e --arg a "$login" '. | index($a) != null' \
                  > /dev/null 2>&1; then
                echo "  ✅ Allowed bot: $login ($email)"
                SUMMARY="${SUMMARY}\n| \`${login}\` | Bot (allowed) | ✅ |"
              else
                echo "  ❌ Unauthorised bot commit: $login <$email>"
                BOT_FOUND=true
                BOT_LIST="${BOT_LIST}\n- \`${login}\` (\`${email}\`)"
                SUMMARY="${SUMMARY}\n| \`${login}\` | Bot | ❌ Blocked |"
              fi
            else
              echo "  👤 Human: $login ($name <$email>)"
              SUMMARY="${SUMMARY}\n| \`${login}\` | Human | ✅ |"
            fi
          done < <(echo "$COMMITS" | jq -c '.')

          # Write job summary
          {
            printf "%b\n" "$SUMMARY"
            echo ""
            if [ "$BOT_FOUND" = "true" ]; then
              echo "> ❌ **Bot commits detected.** Rebase and squash them, or add the bot to \`allowed-bots\`."
            else
              echo "> ✅ **All commits are from human contributors.**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$BOT_FOUND" = "true" ]; then
            printf "\nBot commits detected:\n%b\n" "$BOT_LIST"
            echo "To fix: rebase and squash bot commits, or add the bot to allowed-bots input."
            if [ "$FAIL_ON_BOT" = "true" ]; then
              exit 1
            else
              echo "::warning::Bot commits found but fail-on-bot-commits is false — continuing."
            fi
          else
            echo ""
            echo "✅ All commits are from human contributors."
          fi
