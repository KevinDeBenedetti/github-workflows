name: Renovate (self)

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 03:00 UTC
  workflow_dispatch:

jobs:
  renovate:
    uses: KevinDeBenedetti/github-workflows/.github/workflows/renovate.yml@main
    secrets: inherit
    with:
      # Use default.json as both the shared preset AND the local Renovate config
      # for this repo itself, so the customManagers for prek.toml also apply here.
      configuration-file: default.json
