name: Release

on:
  workflow_call:
    inputs:
      release-type:
        description: release-please release type (node, python, simple…). Ignored when config-file is provided.
        type: string
        required: false
        default: ''
      initial-version:
        description: >
          Initial version for new releases (e.g., '0.1.0', '1.0.0').
          Only used if manifest file doesn't exist. Customize per repository needs.
        type: string
        required: false
        default: '1.0.0'
      config-file:
        description: >
          Path to release-please-config.json. Supports: root path or '.github/release/' folder.
          If not provided, checks in this order: .github/release/release-please-config.json, release-please-config.json
        type: string
        required: false
        default: ''
      manifest-file:
        description: >
          Path to .release-please-manifest.json. Supports: root path or '.github/release/' folder.
          If not provided, checks in this order: .github/release/.release-please-manifest.json, .release-please-manifest.json
        type: string
        required: false
        default: ''
      git-user-name:
        description: >
          Name used for the git tagger identity when moving the major version tag.
          Falls back to the GIT_USER_NAME repository variable, then 'github-actions[bot]'.
        type: string
        required: false
        default: ''
      git-user-email:
        description: >
          Email used for the git tagger identity when moving the major version tag.
          Falls back to the GIT_USER_EMAIL repository variable, then the Actions noreply address.
        type: string
        required: false
        default: ''
      runner:
        description: Runner labels as JSON — use '"ubuntu-latest"' or '["self-hosted","linux","k3s","kaniko"]'
        type: string
        required: false
        default: '"ubuntu-latest"'
      notify-reviewers:
        description: >
          Comma-separated GitHub usernames to request a review from on the
          release PR (e.g. 'octocat' or 'octocat,hubot'). Each user is added as
          a requested reviewer so they get a GitHub notification. Runs whenever
          release-please opens or updates the PR; re-requesting a still-pending
          reviewer is a no-op, so you are effectively notified once. Leave empty to disable.
        type: string
        required: false
        default: ''
      app-client-id:
        description: >
          Client ID (or App ID) of a GitHub App installed on this repo with
          contents/pull-requests/issues write. When set, a short-lived App token
          is minted and used instead of GITHUB_TOKEN, so the release PR is
          attributed to the App rather than github-actions[bot] — this avoids the
          manual workflow-approval gate and lets CI run on the release PR.
        type: string
        required: false
        default: ''
    secrets:
      RELEASE_TOKEN:
        description: PAT with write access (defaults to GITHUB_TOKEN if not set)
        required: false
      APP_PRIVATE_KEY:
        description: Private key of the GitHub App referenced by app-client-id.
        required: false
    outputs:
      released:
        description: Whether a release was created
        value: ${{ jobs.release.outputs.released }}
      tag:
        description: Tag name of the release (e.g. v1.2.3)
        value: ${{ jobs.release.outputs.tag }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release Please
    runs-on: ${{ fromJson(inputs.runner) }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      released: ${{ steps.rp.outputs.release_created }}
      tag: ${{ steps.rp.outputs.tag_name }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect release config paths
        id: detect-paths
        shell: bash
        run: |
          # Determine config file path
          if [ -n "${{ inputs.config-file }}" ]; then
            CONFIG_FILE="${{ inputs.config-file }}"
          elif [ -f ".github/release/release-please-config.json" ]; then
            CONFIG_FILE=".github/release/release-please-config.json"
          else
            CONFIG_FILE="release-please-config.json"
          fi

          # Determine manifest file path
          if [ -n "${{ inputs.manifest-file }}" ]; then
            MANIFEST_FILE="${{ inputs.manifest-file }}"
          elif [ -f ".github/release/.release-please-manifest.json" ]; then
            MANIFEST_FILE=".github/release/.release-please-manifest.json"
          else
            MANIFEST_FILE=".release-please-manifest.json"
          fi

          {
            echo "config-file=$CONFIG_FILE"
            echo "manifest-file=$MANIFEST_FILE"
            echo "initial-version=${{ inputs.initial-version }}"
          } >> "$GITHUB_OUTPUT"
          echo "ℹ️ Using config: $CONFIG_FILE"
          echo "ℹ️ Using manifest: $MANIFEST_FILE"
          echo "ℹ️ Initial version: ${{ inputs.initial-version }}"

      - name: Initialize manifest with custom version
        shell: bash
        run: |
          MANIFEST_FILE="${{ steps.detect-paths.outputs.manifest-file }}"
          if [ ! -f "$MANIFEST_FILE" ]; then
            mkdir -p "$(dirname "$MANIFEST_FILE")"
            cat > "$MANIFEST_FILE" << 'EOF'
          {
            ".": "${{ steps.detect-paths.outputs.initial-version }}"
          }
          EOF
            echo "✅ Created manifest with initial version: ${{ steps.detect-paths.outputs.initial-version }}"
          fi

      - name: Generate App token
        id: app-token
        if: inputs.app-client-id != ''
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ inputs.app-client-id }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Release Please
        id: rp
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token || (secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN) || github.token }}
          release-type: ${{ inputs.release-type || '' }}
          config-file: ${{ steps.detect-paths.outputs.config-file }}
          manifest-file: ${{ steps.detect-paths.outputs.manifest-file }}

      - name: Request review on release PR
        if: inputs.notify-reviewers != '' && steps.rp.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || (secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN) || github.token }}
          PRS: ${{ steps.rp.outputs.prs }}
          REVIEWERS: ${{ inputs.notify-reviewers }}
        shell: bash
        run: |
          echo "$PRS" | jq -r '.[].number' | while read -r pr; do
            [ -n "$pr" ] || continue
            echo "ℹ️ Requesting review from $REVIEWERS on PR #$pr"
            gh pr edit "$pr" \
              --repo "${{ github.repository }}" \
              --add-reviewer "$REVIEWERS" \
              || echo "⚠️ Could not request review on PR #$pr"
          done

      - name: Notify reviewers on release PR
        # Posts an @mention comment on the release PR. A review request alone is
        # easy to miss (notification settings vary), but an @mention reliably
        # reaches the user — this is the actual "new release PR" notification.
        if: inputs.notify-reviewers != '' && steps.rp.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || (secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN) || github.token }}
          PRS: ${{ steps.rp.outputs.prs }}
          REVIEWERS: ${{ inputs.notify-reviewers }}
        shell: bash
        run: |
          # Hidden marker so re-runs don't post duplicate notification comments.
          MARKER="<!-- release-please-notify -->"

          # Build "@user1 @user2" from the comma-separated reviewer list.
          MENTIONS=""
          IFS=',' read -ra USERS <<< "$REVIEWERS"
          for u in "${USERS[@]}"; do
            u="$(echo "$u" | xargs)"
            [ -n "$u" ] && MENTIONS="${MENTIONS}@${u} "
          done

          echo "$PRS" | jq -r '.[].number' | while read -r pr; do
            [ -n "$pr" ] || continue
            if gh pr view "$pr" --repo "${{ github.repository }}" --json comments \
                --jq '.comments[].body' 2>/dev/null | grep -qF "$MARKER"; then
              echo "ℹ️ Notification already posted on PR #$pr, skipping"
              continue
            fi
            echo "ℹ️ Notifying $REVIEWERS on PR #$pr"
            gh pr comment "$pr" \
              --repo "${{ github.repository }}" \
              --body "${MARKER}"$'\n'"🚀 ${MENTIONS}a new release PR is ready for review." \
              || echo "⚠️ Could not comment on PR #$pr"
          done

  tag-workflows:
    name: Tag @v<major> alias
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ${{ fromJson(inputs.runner) }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Move major version tag
        # e.g. v1.2.3 → also updates tag v1
        env:
          GIT_USER_NAME: ${{ inputs.git-user-name || vars.GIT_USER_NAME || 'github-actions[bot]' }}
          GIT_USER_EMAIL: ${{ inputs.git-user-email || vars.GIT_USER_EMAIL || 'github-actions[bot]@users.noreply.github.com' }}
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          MAJOR=$(echo "$TAG" | cut -d. -f1)  # e.g. "v1"
          git config user.name  "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"
          git tag -fa "$MAJOR" -m "Release $TAG"
          git push origin "$MAJOR" --force
