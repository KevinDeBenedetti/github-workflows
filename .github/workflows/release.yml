name: Release

on:
  workflow_call:
    inputs:
      release-type:
        description: release-please release type (node, python, simple…). Ignored when config-file is provided.
        type: string
        required: false
        default: ''
      config-file:
        description: Path to release-please-config.json
        type: string
        required: false
        default: release-please-config.json
      manifest-file:
        description: Path to .release-please-manifest.json
        type: string
        required: false
        default: .release-please-manifest.json
      git-user-name:
        description: >
          Name used for the git tagger identity when moving the major version tag
          (e.g. "Kevin De Benedetti"). Defaults to "github-actions[bot]".
        type: string
        required: false
        default: 'Kevin De Benedetti'
      git-user-email:
        description: >
          Email used for the git tagger identity when moving the major version tag
          (e.g. "you@example.com"). Defaults to the GitHub Actions bot email.
        type: string
        required: false
        default: 'contact@kevindb.dev'
    secrets:
      RELEASE_TOKEN:
        description: PAT with write access (defaults to GITHUB_TOKEN if not set)
        required: false
    outputs:
      released:
        description: Whether a release was created
        value: ${{ jobs.release.outputs.released }}
      tag:
        description: Tag name of the release (e.g. v1.2.3)
        value: ${{ jobs.release.outputs.tag }}

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      released: ${{ steps.rp.outputs.release_created }}
      tag: ${{ steps.rp.outputs.tag_name }}

    steps:
      - name: Release Please
        id: rp
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}
          release-type: ${{ inputs.release-type || '' }}
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}

  tag-workflows:
    name: Tag @v<major> alias
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Move major version tag
        # e.g. v1.2.3 → also updates tag v1
        env:
          GIT_USER_NAME: ${{ inputs.git-user-name }}
          GIT_USER_EMAIL: ${{ inputs.git-user-email }}
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          MAJOR=$(echo "$TAG" | cut -d. -f1)  # e.g. "v1"
          git config user.name  "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"
          git tag -fa "$MAJOR" -m "Release $TAG"
          git push origin "$MAJOR" --force
