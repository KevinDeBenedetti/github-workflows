name: Security

on:
  workflow_call:
    inputs:
      run-node-audit:
        description: Run pnpm audit on Node.js apps
        type: boolean
        required: false
        default: true
      node-working-directory:
        description: Path to Node.js app
        type: string
        required: false
        default: '.'
      run-python-audit:
        description: Run pip-audit on Python apps
        type: boolean
        required: false
        default: false
      python-working-directory:
        description: Path to Python app
        type: string
        required: false
        default: '.'
      run-secret-scan:
        description: Run Gitleaks secret scanning
        type: boolean
        required: false
        default: true
      run-codeql:
        description: Run CodeQL SAST analysis
        type: boolean
        required: false
        default: true
      codeql-languages:
        description: JSON array of languages for CodeQL (e.g. '["javascript","typescript"]')
        type: string
        required: false
        default: '["javascript","typescript"]'

  workflow_dispatch:
    inputs:
      run-node-audit:
        description: Run pnpm audit on Node.js apps
        type: boolean
        default: true
      node-working-directory:
        description: Path to Node.js app
        type: string
        default: '.'
      run-python-audit:
        description: Run pip-audit on Python apps
        type: boolean
        default: false
      python-working-directory:
        description: Path to Python app
        type: string
        default: '.'
      run-secret-scan:
        description: Run Gitleaks secret scanning
        type: boolean
        default: true
      run-codeql:
        description: Run CodeQL SAST analysis
        type: boolean
        default: true
      codeql-languages:
        description: 'JSON array of languages for CodeQL (e.g. ''["javascript","typescript"]'')'
        type: string
        default: '["javascript","typescript"]'

jobs:
  # ── Dependency audit (Node) ─────────────────────────────────────────────────
  audit-node:
    name: Audit Node.js dependencies
    if: inputs.run-node-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        id: setup
        uses: KevinDeBenedetti/github-workflows/.github/actions/setup-node@main
        with:
          working-directory: ${{ inputs.node-working-directory }}

      - name: Audit dependencies
        working-directory: ${{ inputs.node-working-directory }}
        run: |
          if [ "${{ steps.setup.outputs.package-manager }}" = "bun" ]; then
            bun pm audit --summary
          else
            pnpm audit --audit-level=high
          fi

  # ── Dependency audit (Python) ───────────────────────────────────────────────
  audit-python:
    name: Audit Python dependencies
    if: inputs.run-python-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Python
        uses: KevinDeBenedetti/github-workflows/.github/actions/setup-python@main
        with:
          working-directory: ${{ inputs.python-working-directory }}

      - name: pip-audit
        working-directory: ${{ inputs.python-working-directory }}
        run: uvx pip-audit

  # ── Secret scanning ─────────────────────────────────────────────────────────
  secret-scan:
    name: Scan for leaked secrets
    if: inputs.run-secret-scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
      pull-requests: read

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.24.3"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks

      - name: Gitleaks
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -n "$BEFORE" ] \
            && [ "$BEFORE" != "0000000000000000000000000000000000000000" ] \
            && git cat-file -t "$BEFORE" 2>/dev/null; then
            LOG_OPTS="--no-merges --first-parent ${BEFORE}..HEAD"
          else
            LOG_OPTS="--no-merges"
          fi
          gitleaks git --redact -v --exit-code=1 \
            --report-format=sarif --report-path=results.sarif \
            --log-opts="$LOG_OPTS"

      - name: Upload SARIF report
        if: failure() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          sarif_file: results.sarif
          category: gitleaks

  # ── CodeQL SAST ─────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL (${{ matrix.language }})
    if: inputs.run-codeql
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJson(inputs.codeql-languages) }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@0d579ffd059c29b07949a3cce3983f0780820c98 # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          category: /language:${{ matrix.language }}