name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request_target:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  release:
    name: Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/release.yml@main
    secrets: inherit

  deploy-docs:
    name: Sync docs → central repo
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/cd-docs.yml@main
    secrets: inherit

  check-bot-commits:
    name: Check bot commits
    if: github.event_name == 'pull_request_target'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/check-bot-commits.yml@main
    with:
      allowed-bots: '["dependabot[bot]"]'
