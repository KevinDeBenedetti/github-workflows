name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: KevinDeBenedetti/github-workflows/.github/workflows/ci-shell.yml@main
    with:
      run-shellcheck: false
      run-actionlint: true
      actionlint-paths: .github/workflows/
      run-bats: false
      run-link-check: true
      link-check-paths: 'docs/**/*.md'
      run-docs-link-check: true

  changes:
    name: Detect docs changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - 'docs/**'

  dispatch:
    name: Dispatch docs rebuild
    needs: [ci, changes]
    if: github.event_name == 'push' && needs.changes.outputs.docs == 'true'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/dispatch-docs.yml@main
    secrets: inherit
