name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  release:
    name: Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/release.yml@main
    secrets: inherit

  deploy-docs:
    name: Sync docs → central repo
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/cd-docs.yml@main
    with:
      client-id: ${{ vars.DOCS_APP_CLIENT_ID }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.DOCS_APP_PRIVATE_KEY }}

  check-bot-commits:
    name: Check bot commits
    if: github.event_name == 'pull_request'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/check-bot-commits.yml@main
    with:
      allowed-bots: '["dependabot[bot]", "github-actions[bot]"]'
