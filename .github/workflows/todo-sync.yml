on:
  push:
    branches: [main]
    paths: ['TODO.yml']
  issues:
    types: [labeled, unlabeled, closed, reopened, edited, assigned]

jobs:
  push-to-issues:
    if: github.event_name == 'push'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/todo-yml-push.yml@main
    secrets:
      token: ${{ secrets.PAT_TOKEN }}

  pull-to-todo:
    if: github.event_name == 'issues'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/todo-yml-pull.yml@main
    with:
      issue-number: ${{ github.event.issue.number }}
    secrets:
      token: ${{ secrets.PAT_TOKEN }}
