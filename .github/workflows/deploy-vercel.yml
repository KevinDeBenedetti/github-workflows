name: Deploy — Vercel

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment (preview | production)
        type: string
        required: false
        default: preview
      working-directory:
        description: Path to the app root (e.g. apps/web)
        type: string
        required: false
        default: '.'
      node-version:
        description: Node.js version
        type: string
        required: false
        default: '20'
    secrets:
      VERCEL_TOKEN:
        required: true
      VERCEL_ORG_ID:
        required: true
      VERCEL_PROJECT_ID:
        required: true
    outputs:
      deployment-url:
        description: URL of the Vercel deployment
        value: ${{ jobs.deploy.outputs.deployment-url }}

concurrency:
  group: deploy-vercel-${{ inputs.environment }}-${{ inputs.working-directory }}-${{ github.ref }}
  cancel-in-progress: false  # never cancel a running deploy

jobs:
  deploy:
    name: Vercel ${{ inputs.environment }} (${{ inputs.working-directory }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      deployment-url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: KevinDeBenedetti/.github/.github/actions/setup-node@main
        with:
          node-version: ${{ inputs.node-version }}
          working-directory: ${{ inputs.working-directory }}

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        working-directory: ${{ inputs.working-directory }}
        run: |
          vercel pull --yes \
            --environment=${{ inputs.environment }} \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        working-directory: ${{ inputs.working-directory }}
        run: |
          vercel build \
            ${{ inputs.environment == 'production' && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt
        id: deploy
        working-directory: ${{ inputs.working-directory }}
        run: |
          URL=$(vercel deploy --prebuilt \
            ${{ inputs.environment == 'production' && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "🚀 Deployed to: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment PR with preview URL
        if: inputs.environment == 'preview' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const app = '${{ inputs.working-directory }}';
            const body = `### 🚀 Vercel Preview — \`${app}\`\n\n**URL:** ${url}\n\n_Deployed from commit ${context.sha.slice(0, 7)}_`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c =>
              c.body.includes(`Vercel Preview — \`${app}\``)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }