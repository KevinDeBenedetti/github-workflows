name: Deploy — Docker

on:
  workflow_call:
    inputs:
      image-name:
        description: Image name (e.g. my-api). Defaults to repo name.
        type: string
        required: false
        default: ''
      context:
        description: Docker build context (e.g. apps/api)
        type: string
        required: false
        default: '.'
      dockerfile:
        description: Path to Dockerfile
        type: string
        required: false
        default: Dockerfile
      platforms:
        description: Target platforms (comma-separated)
        type: string
        required: false
        default: linux/amd64,linux/arm64
      push:
        description: Push image to registry
        type: boolean
        required: false
        default: true
      tag-latest:
        description: Also tag as :latest
        type: boolean
        required: false
        default: false
    outputs:
      image:
        description: Full image reference with digest
        value: ${{ jobs.docker.outputs.image }}
      digest:
        description: Image digest
        value: ${{ jobs.docker.outputs.digest }}

env:
  REGISTRY: ghcr.io

concurrency:
  group: deploy-docker-${{ github.ref }}-${{ inputs.context }}
  cancel-in-progress: false

jobs:
  docker:
    name: Docker build & push (${{ inputs.context }})
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set image name
        id: image
        run: |
          NAME="${{ inputs.image-name }}"
          if [ -z "$NAME" ]; then
            NAME="${{ github.event.repository.name }}"
          fi
          echo "full=${REGISTRY}/${{ github.repository_owner }}/${NAME}" >> "$GITHUB_OUTPUT"

      - name: Docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ steps.image.outputs.full }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            ${{ inputs.tag-latest && 'type=raw,value=latest,enable={{is_default_branch}}' || '' }}

      - name: Set up QEMU (multi-platform)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to GHCR
        if: inputs.push
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.context }}
          cache-to: type=gha,scope=${{ inputs.context }},mode=max

      - name: Export digest summary
        run: |
          {
            echo "### 🐳 Docker Image"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Image | \`${{ steps.image.outputs.full }}\` |"
            echo "| Digest | \`${{ steps.build.outputs.digest }}\` |"
            echo "| Platform | \`${{ inputs.platforms }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
