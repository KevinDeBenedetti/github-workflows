name: Deploy — Docker

on:
  workflow_call:
    inputs:
      image-name:
        description: Image name (e.g. my-api). Defaults to repo name.
        type: string
        required: false
        default: ''
      context:
        description: Docker build context (e.g. apps/api)
        type: string
        required: false
        default: '.'
      dockerfile:
        description: Path to Dockerfile
        type: string
        required: false
        default: Dockerfile
      platforms:
        description: Target platforms (comma-separated)
        type: string
        required: false
        default: linux/amd64,linux/arm64
      push:
        description: Push image to registry
        type: boolean
        required: false
        default: true
      tag-latest:
        description: Also tag as :latest
        type: boolean
        required: false
        default: false
    outputs:
      image:
        description: Full image reference with digest
        value: ${{ jobs.docker.outputs.image }}
      digest:
        description: Image digest
        value: ${{ jobs.docker.outputs.digest }}

concurrency:
  group: deploy-docker-${{ github.ref }}-${{ inputs.context }}
  cancel-in-progress: false

jobs:
  docker:
    name: Docker build & push (${{ inputs.context }})
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          NAME="${{ inputs.image-name }}"
          if [ -z "$NAME" ]; then
            NAME="${{ github.event.repository.name }}"
          fi
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          echo "full=${REGISTRY}/${NAME}" >> $GITHUB_OUTPUT

      - name: Docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.full }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            ${{ inputs.tag-latest && 'type=raw,value=latest,enable={{is_default_branch}}' || '' }}

      - name: Set up QEMU (multi-platform)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.context }}
          cache-to: type=gha,scope=${{ inputs.context }},mode=max

      - name: Export digest summary
        run: |
          echo "### 🐳 Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.image.outputs.full }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | \`${{ inputs.platforms }}\` |" >> $GITHUB_STEP_SUMMARY