name: Purge â€” Caches

on:
  workflow_call:
    inputs:
      keep:
        description: Number of most-recently-used caches to keep
        type: number
        required: false
        default: 10
      ref:
        description: Git ref (branch or tag) to restrict purging (e.g. refs/heads/main). Leave empty to purge all refs.
        type: string
        required: false
        default: ''
      dry-run:
        description: List what would be deleted without actually deleting anything
        type: boolean
        required: false
        default: false
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 03:00 UTC
  # NOTE: inputs are duplicated between workflow_call and workflow_dispatch.
  # Keep them in sync manually â€” GitHub does not support shared input definitions.
  workflow_dispatch:
    inputs:
      keep:
        description: Number of most-recently-used caches to keep
        type: number
        required: false
        default: 10
      ref:
        description: Git ref to restrict purging (e.g. refs/heads/main). Leave empty for all refs.
        type: string
        required: false
        default: ''
      dry-run:
        description: List what would be deleted without actually deleting anything
        type: boolean
        required: false
        default: false

concurrency:
  group: purge-caches-${{ github.ref }}
  cancel-in-progress: false

jobs:
  purge:
    name: Purge old caches
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Purge old caches
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP: ${{ inputs.keep || 10 }}
          FILTER_REF: ${{ inputs.ref || '' }}
          DRY_RUN: ${{ inputs.dry-run || false }}
        run: |
          set -euo pipefail

          DELETED=0
          DELETED_BYTES=0
          SUMMARY=""

          # Build ref filter args
          REF_ARGS=()
          if [[ -n "$FILTER_REF" ]]; then
            echo "đź”Ť Filtering by ref: ${FILTER_REF}"
            REF_ARGS=("--ref" "${FILTER_REF}")
          else
            echo "đź”Ť Processing all refs"
          fi

          # Fetch all caches sorted by last-accessed date, newest first
          # Fields: id, key, ref, lastAccessedAt, sizeInBytes
          CACHE_JSON=$(gh cache list \
            "${REF_ARGS[@]}" \
            --limit 1000 \
            --json id,key,ref,lastAccessedAt,sizeInBytes \
            --jq 'sort_by(.lastAccessedAt) | reverse')

          TOTAL=$(echo "$CACHE_JSON" | jq 'length')
          echo "đź“‹ Total caches found: ${TOTAL}"

          if (( TOTAL <= KEEP )); then
            echo "âś… Within retention limit (keep=${KEEP}) â€” nothing to delete"
            {
              echo "### đź§ą Cache Purge $([[ "$DRY_RUN" == "true" ]] && echo "(dry run)" || echo "")"
              echo ""
              echo "**Keep:** \`${KEEP}\` most recently used"
              echo ""
              echo "> âś… Only ${TOTAL} cache(s) found â€” within retention limit."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          TO_DELETE=$(echo "$CACHE_JSON" | jq -c ".[$KEEP:][]")
          COUNT=$(echo "$CACHE_JSON" | jq ".[$KEEP:] | length")
          echo "đź—‘ď¸Ź  Will delete ${COUNT} cache(s) (keeping newest ${KEEP})"

          while IFS= read -r CACHE; do
            ID=$(echo "$CACHE"    | jq -r '.id')
            KEY=$(echo "$CACHE"   | jq -r '.key')
            REF=$(echo "$CACHE"   | jq -r '.ref')
            BYTES=$(echo "$CACHE" | jq -r '.sizeInBytes')
            ACCESSED=$(echo "$CACHE" | jq -r '.lastAccessedAt')

            if [[ "$DRY_RUN" == "true" ]]; then
              echo "   [dry-run] Would delete cache ${ID} | ${KEY} | ${REF} | last used: ${ACCESSED}"
            else
              gh cache delete "$ID"
              echo "   Deleted cache ${ID} | ${KEY} | ${REF}"
              (( DELETED++ ))       || true
              (( DELETED_BYTES += BYTES )) || true
            fi

            SUMMARY+="| \`${KEY}\` | \`${REF}\` | $(numfmt --to=iec-i --suffix=B "$BYTES" 2>/dev/null || echo "${BYTES}B") | ${ACCESSED} |\n"
          done < <(echo "$TO_DELETE")

          # Write job summary
          {
            echo "### đź§ą Cache Purge $([[ "$DRY_RUN" == "true" ]] && echo "(dry run)" || echo "")"
            echo ""
            echo "**Keep:** \`${KEEP}\` most recently used  |  **Total found:** ${TOTAL}  |  **Deleted:** ${COUNT}"
            echo ""
            echo "| Cache key | Ref | Size | Last accessed |"
            echo "|-----------|-----|------|---------------|"
            printf "%b" "$SUMMARY"
            echo ""
            if [[ "$DRY_RUN" == "true" ]]; then
              echo "> â„ąď¸Ź Dry-run mode â€” no caches were deleted."
            else
              FREED=$(numfmt --to=iec-i --suffix=B "$DELETED_BYTES" 2>/dev/null || echo "${DELETED_BYTES}B")
              echo "> Deleted **${DELETED}** cache(s), freeing **${FREED}**."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
