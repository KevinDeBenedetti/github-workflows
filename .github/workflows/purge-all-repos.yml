name: Purge All Repos — Maintenance Orchestrator

on:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 03:00 UTC
  workflow_dispatch:
    inputs:
      keep:
        description: Number of most-recent items to keep
        type: number
        default: 10
        required: false
      dry-run:
        description: Preview without deleting (recommended for first run)
        type: boolean
        default: true
        required: false
      filter-repo:
        description: Filter repos by name pattern (e.g. 'foo-*' for repos starting with 'foo')
        type: string
        required: false
        default: ''

concurrency:
  group: purge-all-repos
  cancel-in-progress: false

jobs:
  discover:
    name: Discover repos
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.repos.outputs.matrix }}
    steps:
      - name: List all repos
        id: repos
        env:
          GH_TOKEN: ${{ github.token }}
          FILTER: ${{ inputs.filter-repo || '' }}
        run: |
          set -euo pipefail

          echo "🔍 Discovering all repos..."
          if [[ -n "$FILTER" ]]; then
            echo "   Filter pattern: $FILTER"
          fi

          # Get authenticated user/org context for repo listing
          OWNER="${GITHUB_ACTOR}"
          echo "   Listing repos for: $OWNER"

          # Get repos and apply filter if provided
          if [[ -n "$FILTER" ]]; then
            MATRIX=$(gh repo list "$OWNER" --limit 1000 --json nameWithOwner | jq -c "[.[] | select(.nameWithOwner | test(\"$FILTER\")) | .nameWithOwner]")
            FILTERED_COUNT=$(echo "$MATRIX" | jq 'length')
            echo "   After filter: $FILTERED_COUNT repo(s)"
          else
            MATRIX=$(gh repo list "$OWNER" --limit 1000 --json nameWithOwner | jq -c '[.[] | .nameWithOwner]')
            COUNT=$(echo "$MATRIX" | jq 'length')
            echo "   Found $COUNT repo(s)"
          fi

          # Use multiline output format for GitHub Actions
          {
            echo "matrix<<EOF"
            echo "$MATRIX"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  purge:
    name: Purge ${{ matrix.repo }}
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      deployments: write
    strategy:
      matrix:
        repo: ${{ fromJson(needs.discover.outputs.matrix) }}
      max-parallel: 3
    continue-on-error: true

    steps:
      - name: Trigger centralized maintenance
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ matrix.repo }}
          KEEP: ${{ inputs.keep || 10 }}
          DRY_RUN: ${{ inputs.dry-run || true }}
        run: |
          set -euo pipefail

          echo "🚀 Triggering maintenance on ${REPO}..."

          # Trigger centralized workflow_dispatch from github-workflows repo
          gh workflow run maintenance.yml \
            --repo KevinDeBenedetti/github-workflows \
            --ref main \
            --field keep="${KEEP}" \
            --field dry-run="${DRY_RUN}"

          echo "✅ Triggered centralized maintenance.yml"
          echo "   Parameters: Repo=${REPO}, Keep=${KEEP}, Dry-run=${DRY_RUN}"

  summary:
    name: Purge Summary
    needs: purge
    runs-on: ubuntu-latest
    if: always()
    permissions:
      actions: read
    steps:
      - name: Report
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP: ${{ inputs.keep || 10 }}
          DRY_RUN: ${{ inputs.dry-run || true }}
        run: |
          {
            echo "### 🧹 Purge All Repos — Orchestration Summary"
            echo ""
            echo "**Status:** ✅ Complete"
            echo "**Mode:** $([ "$DRY_RUN" == "true" ] && echo "🔍 Dry-run (preview)" || echo "⚡ Live execution")"
            echo "**Retention:** Keep \`${KEEP}\` most recent items per workflow"
            echo ""
            echo "## 📋 What Was Processed"
            echo ""
            echo "Centralized maintenance workflows triggered in: **github-workflows**"
            echo ""
            echo "Three purge tasks executed per repository:"
            echo "- 🗑️ **Deployments**: Removes old deployment records from environments"
            echo "- 🗑️ **Workflow Runs**: Removes old GitHub Actions runs (keeps newest N)"
            echo "- 🗑️ **Caches**: Removes old workflow caches (keeps newest N)"
            echo ""
            echo "## 🔍 How to View Detailed Results"
            echo ""
            echo "Check the centralized maintenance workflow runs in this repository:"
            echo ""
            echo "**Link:** [View Maintenance Runs](../../actions/workflows/maintenance.yml)"
            echo ""
            echo "Each maintenance run shows:"
            echo "- ✅ Deployments deleted"
            echo "- ✅ Workflow runs deleted (per workflow)"
            echo "- ✅ Caches deleted"
            echo ""
            echo "## 📚 Learn More"
            echo ""
            echo "- [Purge Deployments Workflow](../../docs/workflows/purge-deployments.md)"
            echo "- [Purge Workflow Runs Workflow](../../docs/workflows/purge-workflow-runs.md)"
            echo "- [Purge Caches Workflow](../../docs/workflows/purge-caches.md)"
          } >> "$GITHUB_STEP_SUMMARY"
