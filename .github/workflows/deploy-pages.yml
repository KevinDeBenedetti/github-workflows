name: Deploy — GitHub Pages

on:
  workflow_call:
    inputs:
      working-directory:
        description: Path to the app (e.g. apps/client)
        type: string
        required: false
        default: '.'
      node-version:
        description: Node.js version
        type: string
        required: false
        default: '20'
      build-command:
        description: Build command to run
        type: string
        required: false
        default: 'pnpm build'
      output-directory:
        description: Build output directory relative to working-directory
        type: string
        required: false
        default: dist
    outputs:
      page-url:
        description: URL of the deployed GitHub Pages site
        value: ${{ jobs.deploy.outputs.page-url }}

jobs:
  build:
    name: Build (${{ inputs.working-directory }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: KevinDeBenedetti/github-workflows/.github/actions/setup-node@main
        with:
          node-version: ${{ inputs.node-version }}
          working-directory: ${{ inputs.working-directory }}

      - name: Build
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.build-command }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ inputs.working-directory }}/${{ inputs.output-directory }}

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    outputs:
      page-url: ${{ steps.pages.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: pages
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          {
            echo "### 📄 GitHub Pages Deployed"
            echo ""
            echo "🌍 **URL:** ${{ steps.pages.outputs.page_url }}"
          } >> "$GITHUB_STEP_SUMMARY"