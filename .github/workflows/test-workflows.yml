name: Test — Reusable workflows

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  ci-shell:
    name: CI — Shell
    uses: ./.github/workflows/ci-shell.yml
    with:
      run-shellcheck: true
      run-actionlint: true
      # Runs tests/*.bats (e.g. the ai-commit-msg hook suite) against this repo's
      # own composite-action scripts.
      run-bats: true
      bats-submodules: false
      # Verify this repo's own docs/ stay VitePress-safe and self-contained:
      # the central docs site (cd-docs.yml) rebuilds from these files.
      run-docs-link-check: true
      run-vitepress-check: true
      # actionlint >= 1.7.12 ships stale metadata for actions/create-github-app-token@v3
      # and falsely flags the `client-id` input / a "missing app-id". Ignore those
      # messages so a future actionlint bump doesn't break CI on release.yml.
      # The value must stay quote-free: the action word-splits flags unquoted.
      actionlint-flags: -ignore create-github-app-token
    permissions:
      contents: read

  security:
    name: Security — Secret scan
    uses: ./.github/workflows/security.yml
    with:
      run-node-audit: false
      run-python-audit: false
      run-secret-scan: true
      run-codeql: false
    permissions:
      security-events: write
      actions: read
      contents: read
      pull-requests: read
