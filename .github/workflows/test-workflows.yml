name: Test — Reusable workflows

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  ci-shell:
    name: CI — Shell
    # Skip the auto-generated release-please PR: it's a bot-authored PR, so its
    # pull_request runs require manual approval. The code is already tested on
    # the source branch before merge, and CI re-runs on push to main after merge.
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    uses: ./.github/workflows/ci-shell.yml
    with:
      run-shellcheck: true
      run-actionlint: true
      run-bats: false
    permissions:
      contents: read

  security:
    name: Security — Secret scan
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    uses: ./.github/workflows/security.yml
    with:
      run-node-audit: false
      run-python-audit: false
      run-secret-scan: true
      run-codeql: false
    permissions:
      security-events: write
      actions: read
      contents: read
      pull-requests: read
