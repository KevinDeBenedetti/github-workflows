name: CI — Node.js

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version
        type: string
        required: false
        default: '20'
      working-directory:
        description: Path to the app (e.g. apps/web, or "." for standalone)
        type: string
        required: false
        default: '.'
      package-manager:
        description: '"pnpm" | "bun" | "auto" (default — detects from lockfile)'
        type: string
        required: false
        default: auto
      framework:
        description: >
          Hint for build output path: "next" | "nuxt" | "vite" | "auto".
          Used only when upload-build is true.
        type: string
        required: false
        default: auto
      run-lint:
        description: Run lint script
        type: boolean
        required: false
        default: true
      run-typecheck:
        description: Run typecheck script
        type: boolean
        required: false
        default: true
      run-test:
        description: Run test suite
        type: boolean
        required: false
        default: true
      run-build:
        description: Run build script
        type: boolean
        required: false
        default: true
      upload-build:
        description: Upload build output as artifact
        type: boolean
        required: false
        default: false
      build-artifact-name:
        description: Name for the uploaded build artifact
        type: string
        required: false
        default: build
      run-link-check:
        description: Check markdown files for broken relative links before building (offline, no HTTP requests)
        type: boolean
        required: false
        default: false
      link-check-paths:
        description: Space-separated paths or directories of markdown files to check
        type: string
        required: false
        default: 'docs/'
      runner:
        description: Runner labels as JSON — use '"ubuntu-latest"' or '["self-hosted","linux","k3s","kaniko"]'
        type: string
        required: false
        default: '"ubuntu-latest"'
    secrets:
      github-token:
        description: GitHub token passed as GITHUB_TOKEN env var to the build step (e.g. for scripts that call the GitHub API)
        required: false

  # NOTE: inputs are duplicated between workflow_call and workflow_dispatch.
  # Keep them in sync manually — GitHub does not support shared input definitions.
  workflow_dispatch:
    inputs:
      node-version:
        description: Node.js version
        type: string
        default: '20'
      working-directory:
        description: Path to the app (e.g. apps/web, or "." for standalone)
        type: string
        default: '.'
      package-manager:
        description: '"pnpm" | "bun" | "auto" (default — detects from lockfile)'
        type: string
        default: auto
      framework:
        description: 'Hint for build output path: "next" | "nuxt" | "vite" | "auto"'
        type: string
        default: auto
      run-lint:
        description: Run lint script
        type: boolean
        default: true
      run-typecheck:
        description: Run typecheck script
        type: boolean
        default: true
      run-test:
        description: Run test suite
        type: boolean
        default: true
      run-build:
        description: Run build script
        type: boolean
        default: true
      upload-build:
        description: Upload build output as artifact
        type: boolean
        default: false
      build-artifact-name:
        description: Name for the uploaded build artifact
        type: string
        default: build
      run-link-check:
        description: Check markdown files for broken relative links before building (offline, no HTTP requests)
        type: boolean
        default: false
      link-check-paths:
        description: Space-separated paths or directories of markdown files to check
        type: string
        default: 'docs/'
      runner:
        description: Runner labels as JSON — use '"ubuntu-latest"' or '["self-hosted","linux","k3s","kaniko"]'
        type: string
        default: '"ubuntu-latest"'

concurrency:
  group: ci-node-${{ github.workflow }}-${{ github.ref }}-${{ inputs.working-directory }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (${{ inputs.working-directory }})
    runs-on: ${{ fromJson(inputs.runner) }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Setup resolves pnpm or bun automatically from the lockfile
      - name: Setup Node.js
        id: setup
        uses: KevinDeBenedetti/github-workflows/.github/actions/setup-node@main
        with:
          node-version: ${{ inputs.node-version }}
          working-directory: ${{ inputs.working-directory }}
          package-manager: ${{ inputs.package-manager }}

      # All run commands go through a helper so we write "run: ${{ steps.run-alias.outputs.cmd }} lint"
      - name: Set run alias
        id: run-alias
        shell: bash
        run: |
          PM="${{ steps.setup.outputs.package-manager }}"
          if [ "$PM" = "bun" ]; then
            echo "cmd=bun run" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=pnpm" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint
        if: inputs.run-lint
        working-directory: ${{ inputs.working-directory }}
        run: ${{ steps.run-alias.outputs.cmd }} lint

      - name: Type check
        if: inputs.run-typecheck
        working-directory: ${{ inputs.working-directory }}
        run: ${{ steps.run-alias.outputs.cmd }} typecheck

      - name: Test
        if: inputs.run-test
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |
          if [ "${{ steps.setup.outputs.package-manager }}" = "bun" ]; then
            bun run test
          else
            pnpm test --passWithNoTests
          fi

      - name: Check markdown links
        if: inputs.run-link-check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress ${{ inputs.link-check-paths }}
          fail: true

      # Next.js keeps an incremental compiler cache in .next/cache. Deps are
      # already cached by setup-node; this restores the build cache so unchanged
      # routes/modules aren't recompiled. Keyed on the lockfile + commit sha so
      # each run saves a fresh entry, with restore-keys falling back to the most
      # recent cache for the same dependency set. No-op for non-Next frameworks.
      - name: Cache Next.js build
        if: inputs.run-build && inputs.framework == 'next'
        uses: actions/cache@v5
        with:
          path: ${{ inputs.working-directory }}/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory), format('{0}/pnpm-lock.yaml', inputs.working-directory)) }}-${{ github.sha }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory), format('{0}/pnpm-lock.yaml', inputs.working-directory)) }}-

      - name: Build
        if: inputs.run-build
        working-directory: ${{ inputs.working-directory }}
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}
          # Opt out of framework/tool telemetry so CI builds transmit nothing
          # (Next.js, Turbo, and the generic DO_NOT_TRACK convention). Harmless
          # for frameworks that don't read them.
          NEXT_TELEMETRY_DISABLED: '1'
          TURBO_TELEMETRY_DISABLED: '1'
          DO_NOT_TRACK: '1'
        run: ${{ steps.run-alias.outputs.cmd }} build

      # Resolve build output path per framework
      - name: Resolve build output path
        if: inputs.upload-build && inputs.run-build
        id: output-path
        shell: bash
        run: |
          FW="${{ inputs.framework }}"
          DIR="${{ inputs.working-directory }}"

          if [ "$FW" = "auto" ]; then
            # Detect from config files
            if [ -f "$DIR/next.config.ts" ] || [ -f "$DIR/next.config.js" ] || [ -f "$DIR/next.config.mjs" ]; then
              FW="next"
            elif [ -f "$DIR/nuxt.config.ts" ] || [ -f "$DIR/nuxt.config.js" ]; then
              FW="nuxt"
            else
              FW="vite"
            fi
          fi

          case "$FW" in
            next)  OUT=".next"   ;;
            nuxt)  OUT=".output" ;;
            *)     OUT="dist"    ;;
          esac

          echo "path=${DIR}/${OUT}" >> "$GITHUB_OUTPUT"
          echo "framework=$FW"     >> "$GITHUB_OUTPUT"
          echo "🏗️ Framework: $FW → output: ${DIR}/${OUT}"

      - name: Upload build artifact
        if: inputs.upload-build && inputs.run-build
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.build-artifact-name }}
          path: ${{ steps.output-path.outputs.path }}
          retention-days: 1
          if-no-files-found: error
