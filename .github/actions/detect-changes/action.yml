name: Detect Changed Apps
description: >
  Detects which subdirectories under apps/ have changed
  and outputs a JSON matrix for downstream jobs.

inputs:
  apps-directory:
    description: Root directory containing app subdirectories
    required: false
    default: 'apps'
  base-ref:
    description: Base git ref to compare against
    required: false
    default: ''

outputs:
  changed-apps:
    description: JSON array of changed app names, e.g. ["api","web"]
    value: ${{ steps.detect.outputs.changed_apps }}
  has-changes:
    description: Whether any app changed ("true" / "false")
    value: ${{ steps.detect.outputs.has_changes }}
  # Per-app flags — useful for if: conditions without matrix
  changed-api:
    description: Whether apps/api changed
    value: ${{ steps.detect.outputs.changed_api }}
  changed-web:
    description: Whether apps/web changed
    value: ${{ steps.detect.outputs.changed_web }}
  changed-client:
    description: Whether apps/client changed
    value: ${{ steps.detect.outputs.changed_client }}

runs:
  using: composite
  steps:
    - name: Detect changed apps
      id: detect
      shell: bash
      run: |
        APPS_DIR="${{ inputs.apps-directory }}"
        BASE_REF="${{ inputs.base-ref }}"

        # Resolve base commit: input > PR base > previous commit on push
        if [ -n "$BASE_REF" ]; then
          BASE_COMMIT="$BASE_REF"
        elif [ -n "${{ github.event.pull_request.base.sha }}" ]; then
          BASE_COMMIT="${{ github.event.pull_request.base.sha }}"
        else
          BASE_COMMIT="${{ github.event.before }}"
          # Fallback: compare with HEAD~1 if before is null/zeros
          if [ -z "$BASE_COMMIT" ] || [ "$BASE_COMMIT" = "0000000000000000000000000000000000000000" ]; then
            BASE_COMMIT="HEAD~1"
          fi
        fi

        echo "Comparing against: $BASE_COMMIT"

        # Discover all app directories
        CHANGED_APPS="[]"
        HAS_CHANGES="false"

        if [ -d "$APPS_DIR" ]; then
          for APP_PATH in "$APPS_DIR"/*/; do
            APP_NAME=$(basename "$APP_PATH")

            # Check if any file changed inside this app
            DIFF=$(git diff --name-only "$BASE_COMMIT" HEAD -- "$APP_PATH" 2>/dev/null || echo "")

            if [ -n "$DIFF" ]; then
              echo "✅ Changed: $APP_NAME"
              CHANGED_APPS=$(echo "$CHANGED_APPS" | jq --arg app "$APP_NAME" '. + [$app]')
              HAS_CHANGES="true"

              # Emit individual flag (sanitize name for output key)
              SAFE_NAME=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9' '_')
              echo "changed_${SAFE_NAME}=true" >> $GITHUB_OUTPUT
            else
              echo "⏭️  Unchanged: $APP_NAME"
              SAFE_NAME=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9' '_')
              echo "changed_${SAFE_NAME}=false" >> $GITHUB_OUTPUT
            fi
          done
        else
          echo "⚠️  Directory '$APPS_DIR' not found — treating all apps as changed"
          HAS_CHANGES="true"
          CHANGED_APPS="[]"
        fi

        echo "changed_apps=$CHANGED_APPS" >> $GITHUB_OUTPUT
        echo "has_changes=$HAS_CHANGES"    >> $GITHUB_OUTPUT
        echo ""
        echo "Summary → changed apps: $CHANGED_APPS"