name: Bats
description: Install Bats and run shell unit tests

inputs:
  tests-dir:
    description: Directory (or file) containing .bats test files
    required: false
    default: tests/

runs:
  using: composite
  steps:
    - name: Install Bats
      shell: bash
      run: npm install -g bats@1.11.0

    - name: Run Bats tests
      shell: bash
      run: bats ${{ inputs.tests-dir }}
