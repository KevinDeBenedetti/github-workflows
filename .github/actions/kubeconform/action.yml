name: kubeconform
description: Validate Kubernetes manifests with kubeconform

inputs:
  paths:
    description: Directory containing Kubernetes manifests
    required: false
    default: kubernetes/
  exclude:
    description: >
      Regex pattern passed to -ignore-filename-pattern to exclude files
      (e.g. '.*-values\.yaml').
    required: false
    default: '.*-values\.yaml'
  include-crds-catalog:
    description: >
      Also validate CRDs against the Datree CRDs-catalog
      (adds cert-manager, Traefik, etc. schemas)
    required: false
    default: 'true'
  ignore-missing-schemas:
    description: >
      Skip validation for resources whose schema is not found (e.g. custom CRDs
      not present in the CRDs-catalog such as Tetragon TracingPolicy).
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Install kubeconform
      shell: bash
      run: |
        KUBECONFORM_VERSION="0.7.0"
        curl -sSfL \
          "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
          | tar xz -C /usr/local/bin kubeconform

    - name: Validate Kubernetes manifests
      shell: bash
      run: |
        SCHEMA_ARGS=("-schema-location" "default")
        if [ "${{ inputs.include-crds-catalog }}" = "true" ]; then
          SCHEMA_ARGS+=(
            "-schema-location"
            "https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json"
          )
        fi

        IGNORE_ARGS=()
        if [ -n "${{ inputs.exclude }}" ]; then
          IGNORE_ARGS+=("-ignore-filename-pattern" "${{ inputs.exclude }}")
        fi
        if [ "${{ inputs.ignore-missing-schemas }}" = "true" ]; then
          IGNORE_ARGS+=("-ignore-missing-schemas")
        fi

        kubeconform -strict -summary \
          "${SCHEMA_ARGS[@]}" \
          "${IGNORE_ARGS[@]}" \
          "${{ inputs.paths }}"
