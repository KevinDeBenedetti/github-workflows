name: yamllint
description: Validate YAML files with yamllint

inputs:
  paths:
    description: Space-separated list of files or directories to validate
    required: false
    default: .github/workflows/
  strict:
    description: Enable strict mode (treats warnings as errors)
    required: false
    default: 'true'
  config-file:
    description: Path to a custom .yamllint.yml config file (optional)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install yamllint
      shell: bash
      run: pip install --quiet yamllint

    - name: Run yamllint
      shell: bash
      run: |
        ARGS=""
        if [ "${{ inputs.strict }}" = "true" ]; then
          ARGS="$ARGS --strict"
        fi
        if [ -n "${{ inputs.config-file }}" ]; then
          ARGS="$ARGS -c ${{ inputs.config-file }}"
        fi
        # shellcheck disable=SC2086
        yamllint $ARGS ${{ inputs.paths }}
