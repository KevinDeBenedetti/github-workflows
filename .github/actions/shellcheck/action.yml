name: ShellCheck
description: Run ShellCheck on all shell scripts in the repository

inputs:
  severity:
    description: 'Minimum severity level: error | warning | info | style'
    required: false
    default: warning
  exclude-paths:
    description: Path glob passed to find -not -path to exclude from analysis
    required: false
    default: '*/test_helper/*'

runs:
  using: composite
  steps:
    - name: Install ShellCheck
      shell: bash
      run: |
        SHELLCHECK_VERSION="0.11.0"
        INSTALL_DIR="$RUNNER_TEMP/shellcheck"
        mkdir -p "$INSTALL_DIR"
        curl -sSfL --retry 5 --retry-delay 5 --retry-all-errors \
          -o "$RUNNER_TEMP/shellcheck.tar.xz" \
          "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
        tar xJ -C "$INSTALL_DIR" --strip-components=1 \
          "shellcheck-v${SHELLCHECK_VERSION}/shellcheck" < "$RUNNER_TEMP/shellcheck.tar.xz"
        echo "$INSTALL_DIR" >> "$GITHUB_PATH"

    - name: Run ShellCheck
      shell: bash
      run: |
        find . -type f -name "*.sh" \
          -not -path "${{ inputs.exclude-paths }}" \
          -exec shellcheck \
            --severity=${{ inputs.severity }} \
            --shell=bash \
            --format=gcc \
            {} +
