name: actionlint
description: Validate GitHub Actions workflow files with actionlint

inputs:
  paths:
    description: Space-separated list of workflow files or directories to validate
    required: false
    default: .github/workflows/
  flags:
    description: Extra flags passed to actionlint (e.g. -ignore 'SC2086')
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install actionlint
      shell: bash
      run: |
        ACTIONLINT_VERSION="1.7.11"
        INSTALL_DIR="$RUNNER_TEMP/actionlint"
        mkdir -p "$INSTALL_DIR"
        curl -sSfL --retry 5 --retry-delay 5 --retry-all-errors \
          -o "$RUNNER_TEMP/actionlint.tar.gz" \
          "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
        tar xz -C "$INSTALL_DIR" actionlint < "$RUNNER_TEMP/actionlint.tar.gz"
        echo "$INSTALL_DIR" >> "$GITHUB_PATH"

    - name: Run actionlint
      shell: bash
      env:
        INPUT_PATHS: ${{ inputs.paths }}
        INPUT_FLAGS: ${{ inputs.flags }}
      run: |
        # Build the file list safely into an array (handles paths with spaces).
        FILES=()
        for p in $INPUT_PATHS; do
          if [ -d "$p" ]; then
            while IFS= read -r -d '' f; do
              FILES+=("$f")
            done < <(find "$p" \( -name '*.yml' -o -name '*.yaml' \) -print0)
          else
            FILES+=("$p")
          fi
        done
        # INPUT_FLAGS is intentionally word-split into separate CLI args.
        # shellcheck disable=SC2086
        actionlint $INPUT_FLAGS "${FILES[@]}"
