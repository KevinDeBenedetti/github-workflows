- id: check-docs-links
  name: No relative links escaping docs/
  description: >
    Ensures relative links in docs/ don't escape the docs/ directory.
    Links to files outside docs/ must use absolute GitHub URLs.
  language: script
  entry: .github/actions/check-docs-links/check-docs-links.sh
  files: ^docs/.*\.md$
  pass_filenames: true

- id: check-vitepress-md
  name: No unescaped Vue interpolations in docs/
  description: >
    Ensures {{ }} expressions in docs/ markdown are escaped with v-pre.
    Unescaped expressions are evaluated by VitePress at SSR build time and
    cause TypeError crashes when the referenced variable is undefined.
  language: script
  entry: .github/actions/check-vitepress-md/check-vitepress-md.sh
  files: ^docs/.*\.md$
  pass_filenames: true

- id: ai-commit-msg
  name: AI commit message (from staged diff)
  description: >
    Pre-fills the commit message from the staged diff using the `claude` CLI
    (headless). No-op when a message is already present, nothing is staged, or
    `claude` is unavailable. Review/edit before completing the commit.
  language: script
  entry: .github/actions/ai-commit-msg/ai-commit-msg.sh
  stages: [prepare-commit-msg]
  always_run: true

- id: purge-todo-done
  name: Purge completed tasks from TODO.md
  description: >
    When TODO.md is part of the commit, strips checked items (`- [x] …`) from the
    "✅ Fait" section and re-stages it, so done tasks are flushed out of the
    tracker at commit time. No-op when TODO.md isn't staged, on merges/squashes,
    or when the Done section is empty. Never blocks a commit.
  language: script
  entry: .github/actions/purge-todo-done/purge-todo-done.sh
  stages: [prepare-commit-msg]
  always_run: true
