# prek.toml — https://prek.j178.dev
# install: brew install j178/tap/prek && prek install
# run:     prek run --all-files | update: prek autoupdate

minimum_prek_version = "0.3.0"
fail_fast = false
default_install_hook_types = ["pre-commit", "prepare-commit-msg"]

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"] },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-json" },
  { id = "check-merge-conflict" },
  { id = "detect-private-key" },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
]

[[repos]]
repo = "https://github.com/rhysd/actionlint"
rev = "v1.7.11"
hooks = [
  { id = "actionlint" },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "check-docs-links"
name = "No relative links escaping docs/"
language = "script"
entry = ".github/actions/check-docs-links/check-docs-links.sh"
files = "^docs/.*\\.md$"
pass_filenames = true

[[repos.hooks]]
id = "check-vitepress-md"
name = "No unescaped Vue interpolations in docs/"
language = "script"
entry = ".github/actions/check-vitepress-md/check-vitepress-md.sh"
files = "^docs/.*\\.md$"
pass_filenames = true

[[repos.hooks]]
id = "ai-commit-msg"
name = "AI commit message (from staged diff)"
language = "script"
entry = ".github/actions/ai-commit-msg/ai-commit-msg.sh"
stages = ["prepare-commit-msg"]
always_run = true

# Runs after ai-commit-msg so the generated message still "sees" the completed
# tasks in the staged diff before they're stripped from TODO.md.
[[repos.hooks]]
id = "purge-todo-done"
name = "Purge completed tasks from TODO.md"
language = "script"
entry = ".github/actions/purge-todo-done/purge-todo-done.sh"
stages = ["prepare-commit-msg"]
always_run = true
